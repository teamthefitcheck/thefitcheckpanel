<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fit Check · Admin</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.27.0/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg-card:#141414;--bg-card2:#1c1c1c;
  --border:#2a2a2a;--border2:#333;
  --text:#f5f5f5;--text-muted:#888;--text-dim:#555;
  --accent:#ffffff;--accent-dim:#d4d4d4;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--cyan:#06b6d4;--purple:#a78bfa;
  --radius:10px;--radius-sm:6px;
  --sb-bg:#0d0d0d;--sb-border:#1a1a1a;--sb-active:#1e1e1e;--sb-active-border:#2a2a2a;
  --sb-text:#666;--sb-text-active:#fff;
  --overlay-1:#ffffff0d;--overlay-2:#ffffff11;--overlay-3:#ffffff14;--overlay-4:#ffffff18;--overlay-5:#ffffff22;
  --pill-border-active:#555;
}
body[data-theme="bw"]{
  --bg:#000000;--bg-card:#0a0a0a;--bg-card2:#111111;
  --border:#222;--border2:#2a2a2a;
  --text:#ffffff;--text-muted:#666;--text-dim:#444;
  --accent:#ffffff;--accent-dim:#cccccc;
  --green:#ffffff;--red:#ffffff;--yellow:#ffffff;--cyan:#ffffff;--purple:#ffffff;
  --sb-bg:#000;--sb-border:#1c1c1c;--sb-active:#141414;--sb-active-border:#2a2a2a;
  --sb-text:#555;--sb-text-active:#fff;
}
body[data-theme="bw"] .badge-green{background:#ffffff18;color:#fff}
body[data-theme="bw"] .badge-red{background:#ffffff18;color:#fff}
body[data-theme="bw"] .badge-yellow{background:#ffffff18;color:#ccc}
body[data-theme="bw"] .badge-cyan{background:#ffffff18;color:#ccc}
body[data-theme="bw"] .badge-gray{background:#ffffff0e;color:#666}
body[data-theme="bw"] .badge-purple{background:#ffffff18;color:#ccc}
body[data-theme="bw"] .btn-primary{background:#fff;color:#000}
body[data-theme="bw"] input:focus,body[data-theme="bw"] select:focus,body[data-theme="bw"] textarea:focus{border-color:#555}
body[data-theme="light"]{
  --bg:#f5f5f5;--bg-card:#ffffff;--bg-card2:#f0f0f0;
  --border:#e0e0e0;--border2:#d0d0d0;
  --text:#0a0a0a;--text-muted:#666;--text-dim:#999;
  --accent:#000000;--accent-dim:#333;
  --green:#16a34a;--red:#dc2626;--yellow:#d97706;--cyan:#0891b2;--purple:#7c3aed;
  --sb-bg:#ffffff;--sb-border:#e8e8e8;--sb-active:#f0f0f0;--sb-active-border:#d0d0d0;
  --sb-text:#999;--sb-text-active:#000;
  --overlay-1:#0000000a;--overlay-2:#0000000e;--overlay-3:#00000012;--overlay-4:#00000016;--overlay-5:#0000001f;
  --pill-border-active:#999;
}
body[data-theme="light"] .badge-green{background:#16a34a18;color:#16a34a}
body[data-theme="light"] .badge-red{background:#dc262618;color:#dc2626}
body[data-theme="light"] .badge-yellow{background:#d9770618;color:#d97706}
body[data-theme="light"] .badge-cyan{background:#0891b218;color:#0891b2}
body[data-theme="light"] .badge-gray{background:#00000010;color:#666}
body[data-theme="light"] .badge-purple{background:#7c3aed18;color:#7c3aed}
body[data-theme="light"] .btn-primary{background:#000;color:#fff}
body[data-theme="light"] .btn-ghost{border-color:#d0d0d0;color:#666}
body[data-theme="light"] .btn-ghost:hover{border-color:#999;color:#333}
body[data-theme="light"] .btn-danger{border-color:#dc262640;color:#dc2626}
body[data-theme="light"] input,body[data-theme="light"] select,body[data-theme="light"] textarea{background:#fff;border-color:#d0d0d0;color:#0a0a0a}
body[data-theme="light"] input:focus,body[data-theme="light"] select:focus,body[data-theme="light"] textarea:focus{border-color:#666}
body[data-theme="light"] th{color:#999}
body[data-theme="light"] .alert-error{background:#dc262610;border-color:#dc262630;color:#dc2626}
body[data-theme="light"] .alert-success{background:#16a34a10;border-color:#16a34a30;color:#16a34a}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
input,select,textarea{background:var(--bg-card2);border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);font-size:13px;width:100%;outline:none;transition:border-color .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#666}
select option{background:var(--bg-card2);color:var(--text)}
button{cursor:pointer;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;padding:8px 16px;transition:all .15s}
.btn-primary{background:#fff;color:#000;padding:9px 20px}
.btn-primary:hover{background:#e5e5e5}
.btn-ghost{background:transparent;border:1.5px solid var(--border2);color:var(--text-muted);padding:7px 14px}
.btn-ghost:hover{border-color:#555;color:var(--text)}
.btn-danger{background:transparent;border:1.5px solid #ef444455;color:var(--red);padding:7px 14px}
.btn-danger:hover{background:#ef444411}
.btn-sm{padding:5px 12px;font-size:12px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.badge-green{background:#22c55e22;color:var(--green)}
.badge-red{background:#ef444422;color:var(--red)}
.badge-yellow{background:#f59e0b22;color:var(--yellow)}
.badge-cyan{background:#06b6d422;color:var(--cyan)}
.badge-gray{background:#ffffff11;color:var(--text-muted)}
.badge-purple{background:#a78bfa22;color:var(--purple)}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;padding:10px 14px;border-bottom:1px solid var(--border)}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#ffffff04}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto;backdrop-filter:blur(6px)}
.modal{background:var(--bg-card);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:660px;position:relative}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-body{padding:22px 24px;max-height:78vh;overflow-y:auto}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
label{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:.2px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:12px}
.alert-error{background:#ef444415;border:1px solid #ef444430;color:var(--red)}
.alert-success{background:#22c55e15;border:1px solid #22c55e30;color:var(--green)}
.spin{display:inline-block;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#333;border-radius:22px;cursor:pointer;transition:.2s}
.toggle input:checked+.toggle-slider{background:#fff}
.toggle-slider::before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#888;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider::before{transform:translateX(18px);background:#000}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.section-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
</style>
<script>(function(){var t=localStorage.getItem('fc_theme')||'dark';if(t)document.documentElement.setAttribute('data-theme-init',t);})()</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ─── Theme & Icon preset ────────────────────────────────────── */
const SIDEBAR_ICONS_EMOJI = {
  dashboard:'📊', orders:'📦', returns:'↩', emails:'📧', finance:'💰',
  shipping:'🚚', synclogs:'🔄', settings:'⚙',
};
const SIDEBAR_ICONS_MINIMAL = {
  dashboard: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>,
  orders:    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>,
  returns:   <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>,
  emails:    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>,
  shipping:  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
  synclogs:  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>,
  settings:  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  finance:   <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
};

function applyTheme(theme) {
  document.body.setAttribute('data-theme', theme);
  localStorage.setItem('fc_theme', theme);
}
function getStoredTheme() { return localStorage.getItem('fc_theme') || 'dark'; }
function getStoredIcons() { return localStorage.getItem('fc_icons') || 'emoji'; }
const API = '';

/* ─── Helpers ──────────────────────────────────────────────── */
function token() { return localStorage.getItem('fc_admin_token') || ''; }
function setToken(t) { localStorage.setItem('fc_admin_token', t); }
function clearToken() { localStorage.removeItem('fc_admin_token'); localStorage.removeItem('fc_brand'); }
function brand() { return localStorage.getItem('fc_brand') || 'Fit Check'; }

async function apiFetch(url, opts = {}) {
  const r = await fetch(API + url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token()}`, ...(opts.headers||{}) },
  });
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
  return d;
}

function stageBadge(s) {
  const map = {
    delivered:['badge-green','Delivered'], transit:['badge-cyan','In Transit'],
    ofd:['badge-cyan','Out for Delivery'], pickup:['badge-cyan','Picked Up'],
    rto:['badge-red','RTO'], confirmed:['badge-yellow','Confirmed'],
    ready:['badge-yellow','Ready'], partial_collected:['','Partial Collected'],
    cancelled:['badge-red','Cancelled'], new:['badge-gray','New'], misc:['badge-gray','Misc'],
    hold:['badge-red','On Hold'],
    ndr:['badge-red','NDR'],
  };
  const [cls,label] = map[s] || ['badge-gray', s || 'Unknown'];
  const style = s==='partial_collected' ? {background:'#92400e22',color:'#f59e0b',border:'1px solid #f59e0b55'} : {};
  return <span className={`badge ${cls}`} style={style}>{label}</span>;
}

function fmt(d) { return d ? new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—'; }
function fmtMoney(n) { return '₹'+parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2}); }
function fmtPct(n,d) { return d ? ((n/d)*100).toFixed(1)+'%' : '0%'; }

/* ─── DateRangePicker ───────────────────────────────────────── */
function DateRangePicker({ from, to, onChange }) {
  const [open, setOpen] = React.useState(false);
  const [customFrom, setCustomFrom] = React.useState(from);
  const [customTo, setCustomTo] = React.useState(to);
  const ref = React.useRef();

  React.useEffect(() => {
    function handleClick(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);

  function isoDate(d) { return d.toISOString().slice(0,10); }

  const PRESETS = [
    { label: 'Today', get: () => { const d = todayStr; return [d, d]; } },
    { label: 'Yesterday', get: () => { const d = isoDate(new Date(today-86400000)); return [d,d]; } },
    { label: 'Last 7 days', get: () => [isoDate(new Date(today-6*86400000)), todayStr] },
    { label: 'Last 30 days', get: () => [isoDate(new Date(today-29*86400000)), todayStr] },
    { label: 'Last 90 days', get: () => [isoDate(new Date(today-89*86400000)), todayStr] },
    { label: 'This month', get: () => [isoDate(new Date(today.getFullYear(), today.getMonth(), 1)), todayStr] },
    { label: 'Last month', get: () => {
      const f = new Date(today.getFullYear(), today.getMonth()-1, 1);
      const t = new Date(today.getFullYear(), today.getMonth(), 0);
      return [isoDate(f), isoDate(t)];
    }},
    { label: 'This year', get: () => [isoDate(new Date(today.getFullYear(),0,1)), todayStr] },
    { label: 'Last year', get: () => {
      const y = today.getFullYear()-1;
      return [isoDate(new Date(y,0,1)), isoDate(new Date(y,11,31))];
    }},
    { label: 'All time', get: () => ['2020-01-01', todayStr] },
  ];

  function activePreset() {
    for (const p of PRESETS) {
      const [f,t] = p.get();
      if (f === from && t === to) return p.label;
    }
    return null;
  }

  function applyPreset(p) {
    const [f,t] = p.get();
    onChange(f, t);
    setOpen(false);
  }

  function applyCustom() {
    if (customFrom && customTo) { onChange(customFrom, customTo); setOpen(false); }
  }

  function fmtRange(f, t) {
    const ap = activePreset();
    if (ap) return ap;
    const fmt = d => new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    if (!f && !t) return 'All time';
    if (f === t) return fmt(f);
    return `${fmt(f)} – ${fmt(t)}`;
  }

  return (
    <div ref={ref} style={{position:'relative'}}>
      <button onClick={()=>setOpen(o=>!o)} style={{
        background:'var(--bg-card2)', border:'1.5px solid var(--border2)', borderRadius:6,
        color:'var(--text)', fontSize:13, fontWeight:600, padding:'7px 14px',
        display:'flex', alignItems:'center', gap:8, whiteSpace:'nowrap', cursor:'pointer',
        minWidth:180,
      }}>
        <span>📅</span>
        <span style={{flex:1,textAlign:'left'}}>{fmtRange(from,to)}</span>
        <span style={{color:'var(--text-muted)',fontSize:10}}>▾</span>
      </button>
      {open && (
        <div style={{
          position:'absolute', right:0, top:'calc(100% + 6px)', zIndex:500,
          background:'var(--bg-card)', border:'1px solid var(--border2)', borderRadius:10,
          boxShadow:'0 8px 32px rgba(0,0,0,.6)', minWidth:220, overflow:'hidden',
        }}>
          <div style={{padding:'8px 0'}}>
            {PRESETS.map(p => {
              const [f,t] = p.get();
              const active = f===from && t===to;
              return (
                <div key={p.label} onClick={()=>applyPreset(p)} style={{
                  padding:'8px 16px', fontSize:13, cursor:'pointer',
                  background: active ? 'var(--overlay-2)' : 'transparent',
                  color: active ? 'var(--text)' : 'var(--text-muted)',
                  fontWeight: active ? 700 : 400,
                  display:'flex', justifyContent:'space-between', alignItems:'center',
                }}
                onMouseEnter={e=>e.currentTarget.style.background='var(--overlay-1)'}
                onMouseLeave={e=>e.currentTarget.style.background=active?'var(--overlay-2)':'transparent'}>
                  {p.label}
                  {active && <span style={{fontSize:10,color:'var(--green)'}}>✓</span>}
                </div>
              );
            })}
          </div>
          <div style={{borderTop:'1px solid var(--border)',padding:'12px 14px'}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:.8,marginBottom:8}}>Custom range</div>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)} style={{flex:1,padding:'6px 8px',fontSize:12}}/>
              <span style={{color:'var(--text-muted)',fontSize:12}}>→</span>
              <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)} style={{flex:1,padding:'6px 8px',fontSize:12}}/>
            </div>
            <button onClick={applyCustom} className="btn-primary btn-sm" style={{width:'100%',marginTop:8}}>Apply</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── Login ─────────────────────────────────────────────────── */
function Login({ onLogin }) {
  const [pw,setPw] = useState('');
  const [err,setErr] = useState('');
  const [loading,setLoading] = useState(false);
  const submit = async (e) => {
    e.preventDefault(); setLoading(true); setErr('');
    try {
      const d = await apiFetch('/admin/login',{method:'POST',body:JSON.stringify({password:pw})});
      setToken(d.token); localStorage.setItem('fc_brand',d.brand||'Fit Check'); onLogin();
    } catch(e){setErr(e.message);}
    setLoading(false);
  };
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:'#0a0a0a'}}>
      <div style={{width:'100%',maxWidth:360}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{display:'inline-flex',width:56,height:56,background:'#fff',borderRadius:16,alignItems:'center',justifyContent:'center',fontSize:28,fontWeight:900,color:'#000',marginBottom:16,boxShadow:'0 0 0 1px #333'}}>✓</div>
          <h1 style={{fontSize:24,fontWeight:800,color:'#fff',letterSpacing:'-0.5px'}}>{brand()}</h1>
          <p style={{color:'#666',fontSize:13,marginTop:4}}>Admin Panel · Powered by Antortiq</p>
        </div>
        <div className="card" style={{padding:24}}>
          <form onSubmit={submit}>
            {err && <div className="alert alert-error">{err}</div>}
            <div className="field">
              <label>Admin Password</label>
              <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Enter password" autoFocus/>
            </div>
            <button className="btn-primary" type="submit" disabled={loading} style={{width:'100%',marginTop:4,padding:'11px 20px',fontSize:14}}>
              {loading ? 'Signing in…' : 'Sign In →'}
            </button>
          </form>
        </div>
        <p style={{textAlign:'center',color:'#444',fontSize:11,marginTop:20}}>Warehouse staff login at <a href="/staff" style={{color:'#888'}}>/staff</a></p>
      </div>
    </div>
  );
}

/* ─── Sidebar ────────────────────────────────────────────────── */
function Sidebar({ tab, setTab, onLogout, iconPreset }) {
  const items = [
    ['dashboard','Dashboard'],['orders','Orders'],['returns','Returns'],
    ['emails','Emails'],['finance','Finance'],['shipping','Shipping'],['synclogs','Sync Logs'],['settings','Settings'],
  ];
  const icons = iconPreset === 'minimal' ? SIDEBAR_ICONS_MINIMAL : SIDEBAR_ICONS_EMOJI;
  return (
    <div style={{width:220,minHeight:'100vh',background:'var(--sb-bg)',borderRight:'1px solid var(--sb-border)',display:'flex',flexDirection:'column',flexShrink:0,position:'sticky',top:0,height:'100vh'}}>
      <div style={{padding:'20px 16px 14px',borderBottom:'1px solid var(--sb-border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,background:'#fff',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:900,color:'#000',flexShrink:0}}>✓</div>
          <div>
            <div style={{fontWeight:800,fontSize:14,color:'var(--sb-text-active)',letterSpacing:'-0.3px'}}>{brand()}</div>
            <div style={{fontSize:10,color:'var(--sb-text)'}}>by Antortiq</div>
          </div>
        </div>
      </div>
      <nav style={{flex:1,padding:'8px 8px'}}>
        {items.map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{
            width:'100%',display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:8,
            background:tab===id?'var(--sb-active)':'transparent',color:tab===id?'var(--sb-text-active)':'var(--sb-text)',
            border:tab===id?'1px solid var(--sb-active-border)':'1px solid transparent',
            cursor:'pointer',fontSize:13,fontWeight:tab===id?600:400,marginBottom:2,transition:'all .12s',textAlign:'left'
          }}>
            <span style={{fontSize:14,opacity:tab===id?1:.6,display:'flex',alignItems:'center'}}>{icons[id]}</span>{label}
          </button>
        ))}
      </nav>
      <div style={{padding:'10px 8px',borderTop:'1px solid #1a1a1a'}}>
        <button onClick={onLogout} className="btn-ghost" style={{width:'100%',fontSize:12}}>Sign Out</button>
      </div>
    </div>
  );
}

/* ─── Dashboard ──────────────────────────────────────────────── */
function StatBar({ items }) {
  const total = items.reduce((s,i)=>s+(i.value||0),0);
  if (!total) return null;
  return (
    <div style={{display:'flex',height:8,borderRadius:4,overflow:'hidden',gap:1}}>
      {items.map(i=>i.value>0&&(
        <div key={i.label} title={`${i.label}: ${i.value}`} style={{flex:i.value,background:i.color,transition:'flex .5s'}}/>
      ))}
    </div>
  );
}

function MiniStat({ label, value, sub, color }) {
  return (
    <div style={{display:'flex',flexDirection:'column',gap:2}}>
      <div style={{fontSize:11,color:'var(--text-muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:.6}}>{label}</div>
      <div style={{fontSize:20,fontWeight:800,color:color||'var(--text)'}}>{value}</div>
      {sub && <div style={{fontSize:11,color:'var(--text-muted)'}}>{sub}</div>}
    </div>
  );
}

function Dashboard() {
  const [stats,setStats] = useState(null);
  const [orders,setOrders] = useState([]);
  const [loading,setLoading] = useState(true);
  const [audience,setAudience] = useState(null);
  const now = new Date();
  const [from,setFrom] = useState(()=>new Date(now-29*86400000).toISOString().slice(0,10));
  const [to,setTo]     = useState(()=>now.toISOString().slice(0,10));

  const load = useCallback(async (f,t) => {
    setLoading(true);
    try {
      const [s,o] = await Promise.all([
        apiFetch(`/orders/stats?from=${f}&to=${t}`),
        apiFetch(`/orders?from=${f}&to=${t}`),
      ]);
      setStats(s); setOrders((o.orders||[]).slice(0,10));
      apiFetch(`/orders/audience?from=${f}&to=${t}`).then(setAudience).catch(()=>{});
    } finally { setLoading(false); }
  }, []);

  useEffect(()=>{ load(from,to); },[from,to]);

  const s = stats || {};
  const T = s.total || 1;
  const pct = (n) => ((n||0)/T*100).toFixed(1);
  const dispatchedOrders = (s.ready||0)+(s.pickup||0)+(s.transit||0)+(s.ofd||0)+(s.delivered||0)+(s.rto||0);
  const dispatchRate = (dispatchedOrders/T*100).toFixed(1);
  const deliveryRate = ((s.delivered||0)/T*100).toFixed(1);
  const rtoRate = ((s.rto||0)/T*100).toFixed(1);
  const cancelRate = ((s.cancelled||0)/T*100).toFixed(1);

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24,flexWrap:'wrap',gap:12}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:800,color:'var(--text)'}}>Dashboard</h2>
          <p style={{color:'var(--text-muted)',fontSize:13,marginTop:2}}>Store performance overview</p>
        </div>
        <DateRangePicker from={from} to={to} onChange={(f,t)=>{setFrom(f);setTo(t);}} />
      </div>

      {loading ? <div style={{padding:60,color:'var(--text-muted)',textAlign:'center',fontSize:14}}>Loading…</div> : <>

        {/* Row 1 — Top KPIs */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:12,marginBottom:16}}>
          {[
            {label:'Total Orders',value:(s.total||0).toLocaleString(),color:'var(--text)',icon:'📦'},
            {label:'Revenue',value:fmtMoney(s.revenue||0),color:'var(--purple)',icon:'💰'},
            {label:'Avg Order Value',value:fmtMoney(s.aov||0),color:'var(--cyan)',icon:'📊'},
            {label:'Dispatched',value:dispatchedOrders.toLocaleString(),color:'var(--cyan)',icon:'🚀',sub:dispatchRate+'% of total'},
            {label:'Delivered',value:(s.delivered||0).toLocaleString(),color:'var(--green)',icon:'✅',sub:deliveryRate+'% of total'},
            {label:'Pending',value:(s.pending||0).toLocaleString(),color:'var(--yellow)',icon:'⏳',sub:pct(s.pending)+'% of total'},
            {label:'RTO',value:(s.rto||0).toLocaleString(),color:'var(--red)',icon:'↩',sub:rtoRate+'% rate'},
            {label:'Cancelled',value:(s.cancelled||0).toLocaleString(),color:'#ef4444',icon:'✕',sub:cancelRate+'% rate'},
          ].map(({label,value,color,icon,sub})=>(
            <div key={label} className="card" style={{padding:16}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <span style={{fontSize:10,color:'var(--text-muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:.7}}>{label}</span>
                <span style={{fontSize:15}}>{icon}</span>
              </div>
              <div style={{fontSize:22,fontWeight:800,color,lineHeight:1}}>{value}</div>
              {sub && <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>{sub}</div>}
            </div>
          ))}
        </div>

        {/* Row 2 — Dispatch Rate + Revenue Breakdown */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>

          {/* Dispatch Rate card */}
          <div className="card" style={{padding:20}}>
            <div className="section-title">Dispatch Rate</div>
            <div style={{display:'flex',alignItems:'flex-end',gap:8,marginBottom:14}}>
              <div style={{fontSize:36,fontWeight:800,color:'var(--cyan)',lineHeight:1}}>{dispatchRate}%</div>
              <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:4}}>{dispatchedOrders.toLocaleString()} of {(s.total||0).toLocaleString()} orders</div>
            </div>
            <StatBar items={[
              {label:'Delivered',value:s.delivered||0,color:'#22c55e'},
              {label:'In Transit',value:(s.transit||0)+(s.ofd||0),color:'#06b6d4'},
              {label:'Ready/Pickup',value:(s.ready||0)+(s.pickup||0),color:'#60a5fa'},
              {label:'RTO',value:s.rto||0,color:'#ef4444'},
              {label:'Pending',value:s.pending||0,color:'#374151'},
              {label:'Cancelled',value:s.cancelled||0,color:'#1f2937'},
            ]}/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:14}}>
              {[
                {label:'Delivery Rate',value:deliveryRate+'%',color:'var(--green)'},
                {label:'RTO Rate',value:rtoRate+'%',color:'var(--red)'},
                {label:'In Transit',value:((s.transit||0)+(s.ofd||0)).toLocaleString(),color:'var(--cyan)'},
                {label:'Ready',value:((s.ready||0)+(s.pickup||0)).toLocaleString(),color:'#60a5fa'},
              ].map(({label,value,color})=>(
                <div key={label} style={{background:'var(--bg-card2)',borderRadius:8,padding:'10px 12px'}}>
                  <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:.6,marginBottom:4}}>{label}</div>
                  <div style={{fontSize:18,fontWeight:800,color}}>{value}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Revenue Breakdown card */}
          <div className="card" style={{padding:20}}>
            <div className="section-title">Revenue Breakdown</div>
            <div style={{fontSize:28,fontWeight:800,color:'var(--purple)',marginBottom:4}}>{fmtMoney(s.revenue||0)}</div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:14}}>total revenue in period</div>
            {[
              {label:'Dispatched Value',value:s.revenue_dispatched||0,color:'#06b6d4',icon:'🚀'},
              {label:'Delivered Value',value:s.revenue_delivered||0,color:'#22c55e',icon:'✅'},
              {label:'Pending Value',value:s.revenue_pending||0,color:'#f59e0b',icon:'⏳'},
              {label:'RTO Value',value:s.revenue_rto||0,color:'#ef4444',icon:'↩'},
            ].map(({label,value,color,icon})=>{
              const pctV = s.revenue ? (value/s.revenue*100).toFixed(0) : 0;
              return (
                <div key={label} style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                    <span style={{fontSize:12,color:'var(--text-muted)'}}>{icon} {label}</span>
                    <div style={{display:'flex',gap:10,alignItems:'center'}}>
                      <span style={{fontSize:12,fontWeight:700,color}}>{fmtMoney(value)}</span>
                      <span style={{fontSize:11,color:'var(--text-muted)',minWidth:30,textAlign:'right'}}>{pctV}%</span>
                    </div>
                  </div>
                  <div style={{height:4,background:'var(--bg-card2)',borderRadius:2,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${pctV}%`,background:color,borderRadius:2,transition:'width .5s'}}/>

        {/* Row 3 — Order Flow + Payment Mix */}

          {/* Order Flow */}

            <div className="section-title">Order Flow</div>
            {[
              {label:'Pending',count:s.pending||0,color:'#f59e0b',icon:'⏳'},
              {label:'Ready to Dispatch',count:(s.ready||0)+(s.pickup||0),color:'#60a5fa',icon:'📦'},
              {label:'In Transit / OFD',count:(s.transit||0)+(s.ofd||0),color:'#06b6d4',icon:'🚚'},
              {label:'Delivered',count:s.delivered||0,color:'#22c55e',icon:'✅'},
              {label:'RTO',count:s.rto||0,color:'#ef4444',icon:'↩'},
              {label:'Cancelled',count:s.cancelled||0,color:'#6b7280',icon:'✕'},
            ].map(({label,count,color,icon})=>{
              const w = pct(count);
              return (
                <div key={label} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                  <div style={{fontSize:13,width:14,textAlign:'center'}}>{icon}</div>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span style={{fontSize:12,color:'var(--text-muted)'}}>{label}</span>
                      <div style={{display:'flex',gap:8}}>
                        <span style={{fontSize:12,fontWeight:700,color}}>{count.toLocaleString()}</span>

                    </div>
                    <div style={{height:4,background:'var(--bg-card2)',borderRadius:2,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${w}%`,background:color,borderRadius:2,transition:'width .5s'}}/>
                    </div>
                  </div>
                </div>
              );

          </div>

          {/* Payment Mix */}
          <div className="card" style={{padding:20}}>
            <div className="section-title">Payment Mix</div>
            <div style={{marginBottom:14}}>
              <StatBar items={[
                {label:'Prepaid',value:s.prepaid||0,color:'#22c55e'},
                {label:'COD',value:s.cod||0,color:'#f59e0b'},
                {label:'Partial',value:s.partial||0,color:'#f97316'},
              ]}/>
              <div style={{display:'flex',gap:12,marginTop:8,fontSize:11,color:'var(--text-muted)'}}>
                {[['Prepaid','#22c55e'],[' COD','#f59e0b'],['Partial','#f97316']].map(([l,c])=>(
                  <div key={l} style={{display:'flex',alignItems:'center',gap:4}}>
                    <div style={{width:7,height:7,borderRadius:'50%',background:c}}/>
                    {l}
                  </div>
                ))}
              </div>
            </div>
            {[
              {label:'Prepaid',count:s.prepaid||0,revenue:s.prepaid_revenue||0,color:'#22c55e',icon:'💳'},
              {label:'COD',count:s.cod||0,revenue:s.cod_revenue||0,color:'#f59e0b',icon:'💵'},
              {label:'Partial',count:s.partial||0,revenue:s.partial_revenue||0,color:'#f97316',icon:'⚡',
               sub: null},
            ].map(({label,count,revenue,color,icon,sub})=>(
              <div key={label} style={{
                display:'flex',alignItems:'center',justifyContent:'space-between',
                padding:'10px 12px',background:'var(--bg-card2)',borderRadius:8,marginBottom:8,

                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:16}}>{icon}</span>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color}}>{label}</div>
                    {sub && <div style={{fontSize:11,color:'var(--red)'}}>{sub}</div>}
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:700,fontSize:13}}>{count.toLocaleString()} orders</div>
                  <div style={{fontSize:11,color:'var(--text-muted)'}}>{fmtMoney(revenue)}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Row 4 — Audience */}
        {audience && audience.segments && audience.segments.length > 0 && (
          <div className="card" style={{padding:20,marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <div className="section-title" style={{marginBottom:0}}>Audience Breakdown</div>
              <div style={{fontSize:12,color:'var(--text-muted)'}}>{(audience.total||0).toLocaleString()} orders in period</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {audience.segments.map(seg=>{
                const p = audience.total ? (seg.count/audience.total*100).toFixed(1) : 0;
                return (
                  <div key={seg.id}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <div style={{width:8,height:8,borderRadius:'50%',background:seg.color,flexShrink:0}}/>
                        <span style={{fontSize:13,fontWeight:600}}>{seg.name}</span>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:12,fontSize:12}}>
                        <span style={{color:'var(--text-muted)'}}>{fmtMoney(seg.revenue)}</span>
                        <span style={{fontWeight:700,minWidth:32,textAlign:'right'}}>{seg.count.toLocaleString()}</span>
                        <span style={{color:'var(--text-muted)',minWidth:36,textAlign:'right'}}>{p}%</span>
                      </div>
                    </div>
                    <div style={{height:5,background:'var(--bg-card2)',borderRadius:3,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${p}%`,background:seg.color,borderRadius:3,transition:'width .6s',opacity:.85}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Row 5 — Recent Orders */}
        <div className="card" style={{padding:0}}>
          <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',fontWeight:700,fontSize:13}}>Recent Orders</div>
          <table>
            <thead><tr><th>Order</th><th>Customer</th><th>Date</th><th>Amount</th><th>Stage</th></tr></thead>
            <tbody>
              {orders.map(o=>(
                <tr key={o.id||o.shopify_id}>
                  <td style={{fontWeight:700,fontFamily:'monospace'}}>{o.name}</td>
                  <td style={{color:'var(--text-muted)'}}>{o.customer?.firstName} {o.customer?.lastName}</td>
                  <td style={{color:'var(--text-muted)',fontSize:12}}>{fmt(o.created_at)}</td>
                  <td style={{fontWeight:600}}>{fmtMoney(o.total_price)}</td>
                  <td>{stageBadge(o._stage)}</td>
                </tr>
              ))}
              {orders.length===0 && <tr><td colSpan={5} style={{textAlign:'center',color:'var(--text-muted)',padding:28}}>No orders in this period</td></tr>}
            </tbody>
          </table>
        </div>
      </>}
    </div>
  );
}

/* ─── Order Modal ────────────────────────────────────────────── */
function OrderModal({ order: initOrder, token: adminToken, onClose, onUpdated }) {
  const [order,setOrder]     = useState(initOrder);
  const [stage,setStage]     = useState(initOrder._stage||'confirmed');
  const [awb,setAwb]         = useState(initOrder._awb||'');
  const [courier,setCourier] = useState(initOrder._courier||'');
  const [partner,setPartner] = useState('delhivery');
  const [shipMode,setMode]   = useState('Surface');
  const [weight,setWeight]   = useState('0.5');
  const [length,setLength]   = useState('15');
  const [breadth,setBreadth] = useState('12');
  const [height,setHeight]   = useState('8');
  const [tag,setTag]         = useState('');
  const [saving,setSaving]   = useState(false);
  const [creating,setCreating] = useState(false);
  const [tagging,setTagging] = useState(false);
  const [msg,setMsg]         = useState(null);
  const [activeTab,setActiveTab] = useState('details');
  const [ssStatus,setSsStatus] = useState(null);
  const [ssLoading,setSsLoading] = useState(false);

  useEffect(()=>{
    apiFetch(`/orders/${initOrder.id}`).then(d=>{
      if(!d?.line_items) return;
      const imgMap = {};
      (d.line_items||[]).forEach(li=>{ if(li.product_id && li.image_url) imgMap[li.product_id]=li.image_url; });
      setOrder(prev=>({
        ...prev,
        line_items: (prev.line_items||[]).map(li=>({ ...li, image_url: imgMap[li.product_id]||li.image_url||null }))
      }));
    }).catch(()=>{});
  },[initOrder.id]);

  const addr = order.shipping_address || {};

  const saveStage = async () => {
    setSaving(true); setMsg(null);
    try {
      await apiFetch(`/admin/orders/${initOrder.id}/stage`,{method:'PUT',body:JSON.stringify({stage,awb,courier})});
      setMsg({type:'success',text:'Stage updated!'});
      onUpdated && onUpdated();
    } catch(e){setMsg({type:'error',text:e.message});}
    setSaving(false);
  };

  const createShipment = async () => {
    setCreating(true); setMsg(null);
    try {
      const d = await apiFetch(`/admin/orders/${initOrder.id}/create-shipment`,{method:'POST',body:JSON.stringify({
        partner,shipMode,weight:parseFloat(weight)||0.5,length:parseFloat(length)||15,breadth:parseFloat(breadth)||12,height:parseFloat(height)||8
      })});
      setMsg({type:'success',text:`✅ Shipment created! AWB: ${d.awb}`});
      setAwb(d.awb); setCourier(d.courier); setStage('pickup');
      onUpdated && onUpdated();
    } catch(e){setMsg({type:'error',text:e.message});}
    setCreating(false);
  };

  const refreshShipsagar = async () => {
    setSsLoading(true); setSsStatus(null);
    try { const d = await apiFetch(`/admin/orders/${initOrder.id}/shipsagar-status`); setSsStatus(d); }
    catch(e){ setSsStatus({error:e.message}); }
    setSsLoading(false);
  };

  const applyTag = async () => {
    if(!tag.trim()) return;
    setTagging(true); setMsg(null);
    try {
      await apiFetch(`/admin/orders/${initOrder.id}/tag`,{method:'POST',body:JSON.stringify({tag:tag.trim()})});
      setMsg({type:'success',text:`Tag "${tag}" applied!`}); setTag('');
    } catch(e){setMsg({type:'error',text:e.message});}
    setTagging(false);
  };

  const tabs = [['details','Details'],['stage','Stage & Shipping'],['tags','Tags']];

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div>
            <div style={{fontWeight:800,fontSize:17}}>{order.name}</div>
            <div style={{color:'var(--text-muted)',fontSize:12,marginTop:2}}>
              {fmt(order.created_at)} · {order.customer?.firstName} {order.customer?.lastName}
              {' · '}{stageBadge(order._stage)}
            </div>
          </div>
          <button onClick={onClose} style={{background:'transparent',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text-muted)',padding:'4px 10px',cursor:'pointer',fontSize:16,lineHeight:1}}>✕</button>
        </div>

        <div style={{display:'flex',gap:0,padding:'0 24px',borderBottom:'1px solid var(--border)'}}>
          {tabs.map(([id,label])=>(
            <button key={id} onClick={()=>setActiveTab(id)} style={{
              padding:'10px 14px',background:'transparent',border:'none',borderBottom:`2px solid ${activeTab===id?'var(--accent)':'transparent'}`,
              color:activeTab===id?'var(--text)':'var(--text-muted)',fontSize:13,fontWeight:activeTab===id?700:400,cursor:'pointer',transition:'all .15s'
            }}>{label}</button>
          ))}
        </div>

        <div className="modal-body">
          {msg && <div className={`alert alert-${msg.type}`}>{msg.text}</div>}

          {activeTab==='details' && (
            <>
              {/* Items */}
              <div className="section-title">Order Items</div>
              <div style={{marginBottom:18}}>
                {(order.line_items||[]).map((li,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>
                    {li.image_url
                      ? <img src={li.image_url} alt={li.title} style={{width:52,height:52,objectFit:'cover',borderRadius:8,border:'1px solid var(--border)',flexShrink:0,background:'var(--bg-card2)'}} onError={e=>{e.target.style.display='none'}}/>
                      : <div style={{width:52,height:52,borderRadius:8,border:'1px solid var(--border)',background:'var(--bg-card2)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>📦</div>
                    }
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{li.title}</div>
                      {li.variant_title && li.variant_title!=='Default Title' && <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{li.variant_title}</div>}
                      {li.sku && <div style={{fontSize:11,color:'var(--text-dim)',fontFamily:'monospace',marginTop:1}}>SKU: {li.sku}</div>}
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <div style={{fontWeight:700}}>{fmtMoney(li.price*(li.quantity||1))}</div>
                      <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Qty: {li.quantity} · {fmtMoney(li.price)} each</div>
                    </div>
                  </div>
                ))}
                <div style={{borderTop:'1px solid var(--border)',marginTop:4,paddingTop:8}}>
                  {order.subtotal_price > 0 && <div style={{display:'flex',justifyContent:'space-between',padding:'3px 0',fontSize:12,color:'var(--text-muted)'}}><span>Subtotal</span><span>{fmtMoney(order.subtotal_price)}</span></div>}
                  {order.total_discounts > 0 && <div style={{display:'flex',justifyContent:'space-between',padding:'3px 0',fontSize:12,color:'#16a34a'}}><span>Discount {order.discount_codes?.[0]?.code ? `(${order.discount_codes[0].code})` : ''}</span><span>−{fmtMoney(order.total_discounts)}</span></div>}
                  {order.total_shipping != null && <div style={{display:'flex',justifyContent:'space-between',padding:'3px 0',fontSize:12,color:'var(--text-muted)'}}><span>Shipping</span><span>{order.total_shipping===0?'Free':fmtMoney(order.total_shipping)}</span></div>}
                  <div style={{display:'flex',justifyContent:'space-between',padding:'8px 0 3px',fontWeight:700,fontSize:14,borderTop:'2px solid var(--border)',marginTop:4}}><span>Total</span><span>{fmtMoney(order.total_price)}</span></div>
                  {order.total_paid > 0 && <div style={{display:'flex',justifyContent:'space-between',padding:'3px 0',fontSize:12,color:'#16a34a',fontWeight:600}}><span>Paid</span><span>{fmtMoney(order.total_paid)}</span></div>}
                  {order.total_outstanding > 0 && <div style={{display:'flex',justifyContent:'space-between',padding:'3px 0',fontSize:12,color:'#dc2626',fontWeight:600}}><span>Balance Due</span><span>{fmtMoney(order.total_outstanding)}</span></div>}
                </div>
              </div>

              {/* Address */}
              {addr.address1 && (
                <div>
                  <div className="section-title">Shipping Address</div>
                  <div style={{background:'var(--bg-card2)',borderRadius:8,padding:'12px 14px',fontSize:13,color:'var(--text-muted)',lineHeight:1.7}}>
                    <div style={{fontWeight:700,color:'var(--text)',marginBottom:4}}>{addr.name||addr.first_name+' '+addr.last_name}</div>
                    <div>{addr.address1}{addr.address2?', '+addr.address2:''}</div>
                    <div>{addr.city}, {addr.province||addr.state} {addr.zip}</div>
                    {addr.phone && <div style={{marginTop:4}}><a href={`tel:${addr.phone}`} style={{color:'var(--cyan)'}}>{addr.phone}</a></div>}
                    <button onClick={()=>navigator.clipboard?.writeText(`${addr.address1}, ${addr.city} ${addr.zip}`)} style={{marginTop:8,background:'transparent',border:'1px solid var(--border)',borderRadius:4,color:'var(--text-muted)',padding:'3px 8px',fontSize:11,cursor:'pointer'}}>Copy Address</button>
                  </div>
                </div>
              )}

              {/* AWB info */}
              {order._awb && (
                <div style={{marginTop:14}}>
                  <div className="section-title">Tracking</div>
                  <div style={{background:'var(--bg-card2)',borderRadius:8,padding:'10px 14px',fontSize:13}}>
                    <div style={{fontFamily:'monospace',fontWeight:700,color:'var(--cyan)'}}>{order._awb}</div>
                    {order._courier && <div style={{color:'var(--text-muted)',fontSize:12,marginTop:2}}>{order._courier}</div>}
                    {order._tracking_url && <a href={order._tracking_url} target="_blank" style={{fontSize:12,color:'var(--cyan)',display:'block',marginTop:4}}>Track →</a>}
                  </div>
                </div>
              )}

              {/* Tags */}
              {(order.tags||[]).length > 0 && (
                <div style={{marginTop:14}}>
                  <div className="section-title">Order Tags</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {(order.tags||[]).map((t,i)=>(
                      <span key={i} style={{padding:'3px 10px',background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:20,fontSize:11,color:'var(--text-muted)'}}>{t}</span>
                    ))}
                  </div>
                </div>
              )}
            </>
          )}

          {activeTab==='stage' && (
            <>
              <div className="section-title">Update Stage</div>
              <div className="grid-2" style={{marginBottom:12}}>
                <div className="field">
                  <label>Stage</label>
                  <select value={stage} onChange={e=>setStage(e.target.value)}>
                    {['new','hold','confirmed','partial_collected','ready','pickup','transit','ofd','ndr','delivered','rto','cancelled','misc'].map(s=>(
                      <option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>
                    ))}
                  </select>
                </div>
                <div className="field">
                  <label>AWB / Tracking Number</label>
                  <input value={awb} onChange={e=>setAwb(e.target.value)} placeholder="Tracking number"/>
                </div>
              </div>
              <div className="field" style={{marginBottom:14}}>
                <label>Courier</label>
                <input value={courier} onChange={e=>setCourier(e.target.value)} placeholder="e.g. Delhivery, Shiprocket"/>
              </div>
              <button className="btn-primary btn-sm" onClick={saveStage} disabled={saving}>{saving?'Saving…':'Save Stage'}</button>

              <hr style={{border:'none',borderTop:'1px solid var(--border)',margin:'20px 0'}}/>

              <div className="section-title">Live Tracking Status (ShipSagar)</div>
              <button className="btn-ghost btn-sm" onClick={refreshShipsagar} disabled={ssLoading} style={{marginBottom:10}}>
                {ssLoading?<><span className="spin">↻</span> Checking…</>:'↻ Refresh Status'}
              </button>
              {ssStatus && (
                <div style={{padding:'10px 12px',background:'var(--bg-card2)',borderRadius:8,fontSize:12,marginBottom:14}}>
                  {ssStatus.error && <span style={{color:'var(--red)'}}>Error: {ssStatus.error}</span>}
                  {!ssStatus.error && !ssStatus.connected && <span style={{color:'var(--text-muted)'}}>ShipSagar isn't connected — go to Settings → Shipping.</span>}
                  {!ssStatus.error && ssStatus.connected && !ssStatus.registered && <span style={{color:'var(--text-muted)'}}>Not registered with ShipSagar yet{ssStatus.reason==='no_awb'?' — no AWB on this order.':'.'}</span>}
                  {!ssStatus.error && ssStatus.connected && ssStatus.registered && !ssStatus.status && <span style={{color:'var(--yellow)'}}>Tracking request sent to ShipSagar — refresh in a few moments for live status.</span>}
                  {!ssStatus.error && ssStatus.connected && ssStatus.registered && ssStatus.status && (
                    <>
                      <div style={{fontWeight:700,marginBottom:2}}>{ssStatus.status}</div>
                      <div style={{color:'var(--text-muted)'}}>Mapped stage: {ssStatus.stage} {ssStatus.timestamp?`· ${ssStatus.timestamp}`:''}</div>
                    </>
                  )}
                </div>
              )}

              <div className="section-title">Create Shipment via Courier API</div>
              <div className="grid-2" style={{marginBottom:10}}>
                <div className="field">
                  <label>Partner</label>
                  <select value={partner} onChange={e=>setPartner(e.target.value)}>
                    <option value="delhivery">Delhivery</option>
                    <option value="shiprocket">Shiprocket</option>
                  </select>
                </div>
                <div className="field">
                  <label>Mode</label>
                  <select value={shipMode} onChange={e=>setMode(e.target.value)}>
                    <option value="Surface">Surface</option>
                    <option value="Express">Express</option>
                  </select>
                </div>
              </div>
              <div className="grid-3" style={{marginBottom:14}}>
                <div className="field"><label>Weight (kg)</label><input type="number" value={weight} onChange={e=>setWeight(e.target.value)} step="0.1" min="0.1"/></div>
                <div className="field"><label>Length (cm)</label><input type="number" value={length} onChange={e=>setLength(e.target.value)} min="1"/></div>
                <div className="field"><label>Breadth (cm)</label><input type="number" value={breadth} onChange={e=>setBreadth(e.target.value)} min="1"/></div>
              </div>
              <button className="btn-ghost btn-sm" onClick={createShipment} disabled={creating}>
                {creating?<><span className="spin">↻</span> Creating…</>:'🚚 Create Shipment'}
              </button>
            </>
          )}

          {activeTab==='tags' && (
            <>
              <div className="section-title">Apply Tag to Order</div>
              <div style={{display:'flex',gap:8,marginBottom:16}}>
                <input value={tag} onChange={e=>setTag(e.target.value)} placeholder="Tag name e.g. fit-processed" onKeyDown={e=>e.key==='Enter'&&applyTag()}/>
                <button className="btn-primary btn-sm" style={{flexShrink:0}} onClick={applyTag} disabled={tagging}>{tagging?'…':'Apply'}</button>
              </div>
              <p style={{fontSize:11,color:'var(--text-muted)'}}>Tags on this order:</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:8}}>
                {(order.tags||[]).length===0 && <span style={{fontSize:12,color:'var(--text-dim)'}}>No tags</span>}
                {(order.tags||[]).map((t,i)=>(
                  <span key={i} style={{padding:'3px 10px',background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:20,fontSize:11,color:'var(--text-muted)'}}>{t}</span>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ─── Orders ─────────────────────────────────────────────────── */
function Orders() {
  const [allOrders,setAllOrders] = useState([]);
  const [loading,setLoading]     = useState(false);
  const [q,setQ]                 = useState('');
  const [stage,setStage]         = useState('');
  const [from,setFrom]           = useState(()=>new Date(Date.now()-30*86400000).toISOString().slice(0,10));
  const [to,setTo]               = useState(()=>new Date().toISOString().slice(0,10));
  const [page,setPage]           = useState(1);
  const [modal,setModal]         = useState(null);
  const [dbStatus,setDbStatus]   = useState(null);
  const [syncing,setSyncing]     = useState(false);
  const PAGE_SIZE = 50;

  const pollDbStatus = React.useCallback(async () => {
    try { const d = await apiFetch('/admin/sync-orders/status'); setDbStatus(d); return d; } catch { return null; }
  }, []);

  React.useEffect(() => { pollDbStatus(); }, []);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const params = new URLSearchParams();
      if(from) params.set('from',from);
      if(to)   params.set('to',to);
      const d = await apiFetch(`/orders?${params}`);
      setAllOrders(d.orders||[]);
      setPage(1);
    } catch(e){ console.error(e); }
    finally { setLoading(false); }
  },[from,to]);

  useEffect(()=>{ load(); },[from,to]);

  // Client-side filter + search
  const filtered = allOrders.filter(o=>{
    if(stage && o._stage !== stage) return false;
    if(q){
      const lq=q.toLowerCase();
      return o.name.toLowerCase().includes(lq) ||
        ((o.customer?.firstName||'')+' '+(o.customer?.lastName||'')).toLowerCase().includes(lq) ||
        (o.email||'').toLowerCase().includes(lq);
    }
    return true;
  });

  // Stage counts
  const counts = {};
  allOrders.forEach(o=>{ const s=o._stage||'new'; counts[s]=(counts[s]||0)+1; });

  const paged = filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
  const pages = Math.ceil(filtered.length/PAGE_SIZE);

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:800}}>Orders</h2>
          <p style={{color:'var(--text-muted)',fontSize:13,marginTop:2}}>{filtered.length.toLocaleString()} {stage||'total'} orders</p>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button className="btn-primary btn-sm" onClick={load}>{loading?<span className="spin">↻</span>:'↻ Refresh'}</button>
          <button className="btn-ghost btn-sm" onClick={async()=>{
            try{ await apiFetch('/admin/sync-tracking',{method:'POST'}); alert('Tracking sync started — stages will update in the background.'); }
            catch(e){ alert('Sync failed: '+e.message); }
          }} title="Sync shipment status from eShipz">🔄 Sync Tracking</button>
          <button className="btn-ghost btn-sm" disabled={syncing} onClick={async()=>{
            if(!confirm('This will pull all orders from Shopify into the database. It may take a few minutes for 5000+ orders. Continue?')) return;
            try{
              await apiFetch('/admin/sync-orders',{method:'POST'});
              setSyncing(true);
              // Poll every 4s until running=false
              const poll = setInterval(async()=>{
                const d = await pollDbStatus();
                if(d && !d.running){ setSyncing(false); clearInterval(poll); load(); }
              }, 4000);
            } catch(e){ alert('Sync failed: '+e.message); }
          }} title="Pull all orders from Shopify into database">
            {syncing ? <span>⏳ Syncing… {dbStatus?.total_in_db ? `(${dbStatus.total_in_db.toLocaleString()} saved)` : ''}</span> : <span>📥 Sync Orders DB {dbStatus?.total_in_db ? `(${dbStatus.total_in_db.toLocaleString()} in DB)` : ''}</span>}
          </button>
        </div>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
        <input placeholder="Search order, customer…" value={q} onChange={e=>{setQ(e.target.value);setPage(1);}} style={{flex:'1 1 200px',minWidth:150}}/>
        <DateRangePicker from={from} to={to} onChange={(f,t)=>{setFrom(f);setTo(t);load();}} />
      </div>
      <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
        {['','new','hold','confirmed','partial_collected','ready','pickup','transit','ofd','ndr','delivered','rto','cancelled','misc'].map(s=>{
          const active = stage===s;
          const count = s==='' ? allOrders.length : (counts[s]||0);
          const label = s===''?'All':s.charAt(0).toUpperCase()+s.slice(1);
          return (
            <button key={s} onClick={()=>{setStage(s);setPage(1);}} style={{
              padding:'5px 12px',borderRadius:20,border:'1px solid '+(active?'var(--pill-border-active)':'var(--border)'),
              background:active?'var(--overlay-4)':'transparent',color:active?'var(--text)':'var(--text-muted)',
              fontSize:12,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',transition:'all .15s',display:'flex',alignItems:'center',gap:5
            }}>
              {label}
              <span style={{background:active?'var(--overlay-5)':'var(--bg-card2)',color:'var(--text)',borderRadius:10,padding:'1px 6px',fontSize:10,fontWeight:700}}>{count}</span>
            </button>
          );
        })}
      </div>
      <div className="card" style={{padding:0,overflow:'auto'}}>
        <table>
          <thead><tr>
            <th>Order</th><th>Date</th><th>Customer</th>
            <th>Items</th><th>Amount</th><th>Payment</th><th>Stage</th><th>AWB</th><th></th>
          </tr></thead>
          <tbody>
            {paged.map(o=>(
              <tr key={o.id} style={{cursor:'pointer'}} onClick={()=>setModal(o)}>
                <td style={{fontWeight:700,fontFamily:'monospace'}}>{o.name}</td>
                <td style={{color:'var(--text-muted)',fontSize:12}}>{fmt(o.created_at)}</td>
                <td>
                  <div>{o.customer?.firstName} {o.customer?.lastName}</div>
                  {o.email && <div style={{fontSize:11,color:'var(--text-muted)'}}>{o.email}</div>}
                </td>
                <td style={{color:'var(--text-muted)',fontSize:12,maxWidth:160}}>
                  {(o.line_items||[]).slice(0,2).map(li=>li.title).join(', ').slice(0,55)}{(o.line_items||[]).length>2?'…':''}
                </td>
                <td style={{fontWeight:600}}>
                  <div>{fmtMoney(o.total_price)}</div>
                  {o.financial_status==='partially_paid' && <div style={{fontSize:11,color:'#f59e0b',marginTop:2}}>Paid {fmtMoney(o.total_paid)} · Due {fmtMoney(o.total_outstanding)}</div>}
                </td>
                <td>
                  {o.financial_status==='paid'
                    ? <span className="badge badge-green">Prepaid</span>
                    : o.financial_status==='partially_paid'
                    ? <span className="badge" style={{background:'#92400e22',color:'#f59e0b',border:'1px solid #f59e0b55'}}>Partial</span>
                    : <span className="badge badge-yellow">COD</span>
                  }
                </td>
                <td>{stageBadge(o._stage)}</td>
                <td style={{fontFamily:'monospace',fontSize:11,color:'var(--text-muted)'}}>{o._awb||'—'}</td>
                <td onClick={e=>e.stopPropagation()}>
                  <button className="btn-ghost btn-sm" onClick={()=>setModal(o)}>Open</button>
                </td>
              </tr>
            ))}
            {!loading && paged.length===0 && <tr><td colSpan={9} style={{textAlign:'center',color:'var(--text-muted)',padding:32}}>No orders found</td></tr>}
            {loading && <tr><td colSpan={9} style={{textAlign:'center',color:'var(--text-muted)',padding:32}}><span className="spin">↻</span> Loading…</td></tr>}
          </tbody>
        </table>
      </div>
      {pages > 1 && (
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,marginTop:14}}>
          <button className="btn-ghost btn-sm" onClick={()=>setPage(p=>p-1)} disabled={page<=1 || loading}>← Prev</button>
          <span style={{fontSize:12,color:'var(--text-muted)',padding:'0 8px'}}>Page {page} of {pages}</span>
          <button className="btn-ghost btn-sm" onClick={()=>setPage(p=>p+1)} disabled={page>=pages || loading}>Next →</button>
        </div>
      )}
      {modal && <OrderModal order={modal} onClose={()=>setModal(null)} onUpdated={load}/>}
    </div>
  );
}

/* ─── Returns ────────────────────────────────────────────────── */
function Returns() {
  const [rrs,setRrs]         = useState([]);
  const [tab,setTab]         = useState('pending');
  const [loading,setLoading] = useState(false);
  const [modal,setModal]     = useState(null);

  const load = async () => {
    setLoading(true);
    try { const d = await apiFetch(`/admin/returns?status=${tab}`); setRrs(d||[]); } finally {setLoading(false);}
  };
  useEffect(()=>{ load(); },[tab]);

  return (
    <div>
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:800}}>Returns & Exchanges</h2>
        <p style={{color:'var(--text-muted)',fontSize:13,marginTop:2}}>{rrs.length} requests</p>
      </div>
      <div style={{display:'flex',gap:4,marginBottom:16}}>
        {['pending','approved','rejected','in_progress','completed'].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{
            padding:'6px 12px',borderRadius:6,fontSize:12,fontWeight:600,cursor:'pointer',
            border:'1px solid '+(tab===t?'var(--pill-border-active)':'var(--border)'),
            background:tab===t?'var(--overlay-3)':'transparent',color:tab===t?'var(--text)':'var(--text-muted)',textTransform:'capitalize'
          }}>{t.replace('_',' ')}</button>
        ))}
      </div>
      <div className="card" style={{padding:0,overflow:'auto'}}>
        <table>
          <thead><tr><th>ID</th><th>Order</th><th>Type</th><th>Customer</th><th>Reason</th><th>Date</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {rrs.map(rr=>(
              <tr key={rr.request_id}>
                <td style={{fontFamily:'monospace',fontSize:11,color:'var(--text-muted)'}}>{rr.request_id}</td>
                <td style={{fontWeight:600}}>{rr.order_name||'—'}</td>
                <td><span className={`badge ${rr.type==='exchange'?'badge-purple':'badge-cyan'}`}>{rr.type||'return'}</span></td>
                <td style={{color:'var(--text-muted)'}}>{rr.customer_name||'—'}</td>
                <td style={{color:'var(--text-muted)',fontSize:12,maxWidth:140}}>{(rr.reason||'').slice(0,40)}</td>
                <td style={{color:'var(--text-muted)',fontSize:12}}>{fmt(rr.created_at)}</td>
                <td>{stageBadge(rr.status)}</td>
                <td><button className="btn-ghost btn-sm" onClick={()=>setModal(rr)}>Manage</button></td>
              </tr>
            ))}
            {!loading && rrs.length===0 && <tr><td colSpan={8} style={{textAlign:'center',color:'var(--text-muted)',padding:32}}>No {tab.replace('_',' ')} requests</td></tr>}
          </tbody>
        </table>
      </div>
      {modal && <RRModal rr={modal} onClose={()=>{setModal(null);load();}}/>}
    </div>
  );
}

function RRModal({ rr, onClose }) {
  const [status,setStatus]   = useState(rr.status||'pending');
  const [note,setNote]       = useState(rr.admin_note||'');
  const [partner,setPartner] = useState('delhivery');
  const [saving,setSaving]   = useState(false);
  const [creating,setCreating] = useState('');
  const [msg,setMsg]         = useState(null);
  const [localRr,setLocalRr] = useState(rr);

  const save = async () => {
    setSaving(true); setMsg(null);
    try {
      await apiFetch(`/admin/returns/${rr.request_id}`,{method:'PUT',body:JSON.stringify({status,admin_note:note})});
      setMsg({type:'success',text:'Saved!'});
    } catch(e){setMsg({type:'error',text:e.message});}
    setSaving(false);
  };

  const createShipment = async (direction) => {
    setCreating(direction); setMsg(null);
    try {
      const d = await apiFetch(`/admin/returns/${rr.request_id}/create-shipment`,{method:'POST',body:JSON.stringify({direction,partner,weight:0.5,length:15,breadth:12,height:8})});
      setMsg({type:'success',text:`${direction} shipment created! AWB: ${d.awb}`});
      // Refresh local data
      const field = direction==='reverse'?'reverse_shipment':'forward_shipment';
      setLocalRr(prev=>({...prev,[field]:{awb:d.awb,courier:d.courier,partner,created_at:new Date().toISOString()}}));
    } catch(e){setMsg({type:'error',text:e.message});}
    setCreating('');
  };

  const removeShipment = async (dir) => {
    if(!confirm(`Remove ${dir} shipment?`)) return;
    try {
      await apiFetch(`/admin/returns/${rr.request_id}/shipment/${dir}`,{method:'DELETE'});
      const field = dir==='reverse'?'reverse_shipment':'forward_shipment';
      setLocalRr(prev=>{const n={...prev};delete n[field];return n;});
      setMsg({type:'success',text:'Removed.'});
    } catch(e){setMsg({type:'error',text:e.message});}
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">

        </div>
        <div className="modal-body">

          {(rr.items||[]).length>0 && (

                </div>
              ))}
            </div>
          )}

          {/* Address */}
          {rr.customer_address1 && (
            <div style={{marginBottom:14,background:'var(--bg-card2)',borderRadius:8,padding:'10px 12px',fontSize:12,color:'var(--text-muted)'}}>

              <div>{rr.customer_address1}, {rr.customer_city} {rr.customer_pincode}</div>
              {rr.customer_phone && <div>{rr.customer_phone}</div>}
            </div>

          {rr.shipping_address && (

          )}

          <div className="grid-2" style={{marginBottom:12}}>
            <div className="field">
              <label>Status</label>

            <div className="field">
              <label>Reason from Customer</label>

          </div>
          <div className="field" style={{marginBottom:12}}>
            <label>Admin Note</label>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={2}/>
          </div>
          <button className="btn-primary btn-sm" onClick={save} disabled={saving} style={{marginBottom:18}}>{saving?'Saving…':'Save'}</button>

          <hr style={{border:'none',borderTop:'1px solid var(--border)',margin:'0 0 14px'}}/>
          <div className="section-title">Shipments</div>
          <div className="field" style={{marginBottom:10}}>
            <label>Courier Partner</label>
            <select value={partner} onChange={e=>setPartner(e.target.value)} style={{width:180}}>
              <option value="delhivery">Delhivery</option>
              <option value="shiprocket">Shiprocket</option>
            </select>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {localRr.reverse_shipment
              ? <div style={{fontSize:12,color:'var(--cyan)',padding:'6px 12px',border:'1px solid var(--cyan)33',borderRadius:6,display:'flex',gap:8,alignItems:'center'}}>
                  ↩ {localRr.reverse_shipment.awb}
                  <button onClick={()=>removeShipment('reverse')} style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:12}}>✕</button>
                </div>
              : <button className="btn-ghost btn-sm" onClick={()=>createShipment('reverse')} disabled={!!creating}>
                  {creating==='reverse'?<><span className="spin">↻</span> Creating…</>:'↩ Create Reverse Pickup'}
                </button>
            }
            {rr.type==='exchange' && (
              localRr.forward_shipment
                ? <div style={{fontSize:12,color:'var(--green)',padding:'6px 12px',border:'1px solid var(--green)33',borderRadius:6,display:'flex',gap:8,alignItems:'center'}}>
                    → {localRr.forward_shipment.awb}

                  </div>
                : <button className="btn-ghost btn-sm" onClick={()=>createShipment('forward')} disabled={!!creating}>
                    {creating==='forward'?<><span className="spin">↻</span> Creating…</>:'→ Create Forward Dispatch'}
                  </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

const STAGE_EMAIL_LABELS = {
  confirmed: ['Order Confirmed 🎉', 'Sent when an order moves to Confirmed'],
  pickup: ['Order Shipped 🚚', 'Sent when a courier picks up the order'],
  transit: ['In Transit 📦', 'Sent when tracking shows the shipment in transit'],
  ofd: ['Out for Delivery 🛵', 'Sent when tracking shows out for delivery'],
  delivered: ['Delivered ✅', 'Sent when tracking shows delivered'],
  rto: ['RTO Update', 'Sent when a shipment is returned to origin'],
  partial_collected: ['Partial Payment Collected 💰', 'Sent when a partial COD payment is recorded'],
  hold: ['Order On Hold ⏸', 'Sent when an order sits unconfirmed for 7+ days'],
  ndr: ['Delivery Failed / NDR ⚠️', 'Sent when a delivery attempt fails'],
};

function StageEmailToggles() {
  const [globalOn,setGlobalOn]   = useState(true);
  const [toggles,setToggles]     = useState({});
  const [loading,setLoading]     = useState(true);
  const [msg,setMsg]             = useState(null);

  useEffect(()=>{
    apiFetch('/admin/global-email-enabled').then(d=>setGlobalOn(d?.enabled!==false));
    apiFetch('/admin/stage-email-settings').then(d=>{setToggles(d||{});setLoading(false);}).catch(()=>setLoading(false));
  },[]);

  const setGlobal = async (val) => {
    setGlobalOn(val); setMsg(null);
    try { await apiFetch('/admin/global-email-enabled',{method:'POST',body:JSON.stringify({enabled:val})}); setMsg({type:'success',text:val?'Emails enabled — customers will receive notifications.':'Emails paused — no emails will be sent until you turn this back on.'}); }
    catch(e){ setMsg({type:'error',text:e.message}); setGlobalOn(!val); }
  };

  const toggle = async (stage, val) => {
    setToggles(prev=>({...prev,[stage]:val})); setMsg(null);
    try { await apiFetch('/admin/stage-email-settings',{method:'POST',body:JSON.stringify({stage,enabled:val})}); }
    catch(e){ setMsg({type:'error',text:e.message}); setToggles(prev=>({...prev,[stage]:!val})); }
  };

  return (
    <div className="card" style={{maxWidth:560}}>
      <div style={{fontWeight:700,marginBottom:6}}>Email Notifications</div>

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px',background:globalOn?'var(--bg-card2)':'#ef444420',border:'1px solid '+(globalOn?'var(--border)':'#ef4444'),borderRadius:10,marginBottom:16}}>
        <div>
          <div style={{fontWeight:700,fontSize:14}}>{globalOn?'Emails ON':'Emails PAUSED'}</div>
          <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>{globalOn?'Customers are receiving notifications':'No emails are being sent — toggle on when ready to go live'}</div>
        </div>
        <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
          <span style={{fontSize:12,color:'var(--text-muted)'}}>{globalOn?'On':'Off'}</span>
          <input type="checkbox" checked={globalOn} onChange={e=>setGlobal(e.target.checked)} style={{width:20,height:20,accentColor:'#111'}}/>
        </label>
      </div>

      {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:14}}>{msg.text}</div>}

      <div style={{fontWeight:600,fontSize:13,marginBottom:8,opacity:globalOn?1:0.4}}>Per-stage toggles</div>
      <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:12,opacity:globalOn?1:0.4}}>
        Fine-grained control — turn off a specific stage's email without pausing everything.
      </p>
      {loading && <div style={{color:'var(--text-muted)',fontSize:13}}>Loading…</div>}
      {!loading && Object.keys(STAGE_EMAIL_LABELS).map(stage=>{
        const [label,desc] = STAGE_EMAIL_LABELS[stage];
        const enabled = toggles[stage]!==false;
        return (
          <div key={stage} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',background:'var(--bg-card2)',borderRadius:8,marginBottom:8}}>
            <div>
              <div style={{fontWeight:600,fontSize:13}}>{label}</div>
              <div style={{fontSize:11,color:'var(--text-muted)'}}>{desc}</div>
            </div>
            <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
              <input type="checkbox" checked={enabled} onChange={e=>toggle(stage,e.target.checked)} style={{width:18,height:18,accentColor:'#111'}}/>
            </label>
          </div>
        );
      })}
    </div>
  );
}

/* ─── Shipping ────────────────────────────────────────────────── */
function Shipping() {

  const [form,setForm]       = useState({});
  const [saving,setSaving]   = useState(false);
  const [msg,setMsg]         = useState(null);

  const delhiveryFields=[['API Token','api_token','Your Delhivery API token'],['Pickup Location Name','pickup_location','Warehouse name on Delhivery'],['Company Name','company_name','Your brand/company name'],['Return Address','return_address','Warehouse address'],['Return City','return_city','City'],['Return State','return_state','State'],['Return Pincode','return_pincode','Pincode'],['Return Phone','return_phone','Contact number']];
  const shiprocketFields=[['Email','email','Shiprocket account email'],['Password','password','Shiprocket account password'],['Pickup Location','pickup_location','Pickup location name'],['Company Name','company_name','Your brand name']];
  const shipsagarFields=[['API Key (Token)','api_key','Your ShipSagar API token'],['Client Code','client_code','Your ShipSagar client code'],['Admin Email','admin_email','Account admin email'],['Admin Phone','admin_phone','Account admin phone']];
  const fields = partner==='delhivery'?delhiveryFields:partner==='shiprocket'?shiprocketFields:shipsagarFields;

  useEffect(()=>{ apiFetch('/admin/shipping-creds').then(d=>setCreds(d||[])); },[]);

      await apiFetch('/admin/shipping-creds',{method:'POST',body:JSON.stringify({partner,credentials:form})});
      setMsg({type:'success',text:`${partner} credentials saved!`});
      apiFetch('/admin/shipping-creds').then(d=>setCreds(d||[]));

  return (
    <div>
      <div style={{marginBottom:20}}><h2 style={{fontSize:20,fontWeight:800}}>Shipping</h2></div>

            <select value={partner} onChange={e=>{setPartner(e.target.value);setForm({});}}>

              <option value="shiprocket">Shiprocket</option>
              <option value="shipsagar">ShipSagar (multi-courier AWB tracking)</option>
            </select>
          </div>
          {fields.map(([label,key,ph])=>(
            <div className="field" key={key}>
              <label>{label}</label>
              <input type={key.includes('password')||key.includes('token')?'password':'text'} value={form[key]||''} onChange={e=>setForm({...form,[key]:e.target.value})} placeholder={ph}/>
            </div>
          ))}
          <button className="btn-primary" onClick={save} disabled={saving}>{saving?'Saving…':'Save'}</button>
        </div>
        <div style={{flex:'1 1 220px'}}>
          <div className="card">
            <div style={{fontWeight:700,marginBottom:12}}>Connected Partners</div>
            {creds.length===0 && <div style={{color:'var(--text-muted)',fontSize:13}}>None connected yet</div>}
