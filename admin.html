              <div key={c.partner} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <div><div style={{fontWeight:600,fontSize:13,textTransform:'capitalize'}}>{c.partner}</div><div style={{fontSize:11,color:'var(--green)'}}>● Connected</div></div>
                <button className="btn-danger btn-sm" onClick={async()=>{await apiFetch(`/admin/shipping-creds/${c.partner}`,{method:'DELETE'});apiFetch('/admin/shipping-creds').then(d=>setCreds(d||[]));}}>Remove</button>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── AudienceSettings ────────────────────────────────────────── */
const AUDIENCE_COLORS = ['#ef4444','#f59e0b','#22c55e','#06b6d4','#a78bfa','#f97316','#ec4899','#64748b'];

function AudienceSettings({ segments, shopifyTags, tagsLoading, onSave, saving }) {
  const [editIdx, setEditIdx] = React.useState(null);
  const [editName, setEditName] = React.useState('');
  const [editColor, setEditColor] = React.useState(AUDIENCE_COLORS[0]);
  const [editTags, setEditTags] = React.useState([]);
  const [tagInput, setTagInput] = React.useState('');

  function openNew() {
    setEditIdx('new');
    setEditName('');
    setEditColor(AUDIENCE_COLORS[segments.length % AUDIENCE_COLORS.length]);
    setEditTags([]);
    setTagInput('');
  }

  function openEdit(i) {
    setEditIdx(i);
    const s = segments[i];
    setEditName(s.name);
    setEditColor(s.color);
    setEditTags([...(s.tags||[])]);
    setTagInput('');
  }

  function addTag(t) {
    const trimmed = t.trim();
    if (!trimmed || editTags.includes(trimmed)) return;
    setEditTags(prev=>[...prev, trimmed]);
    setTagInput('');
  }

  function saveEdit() {
    if (!editName.trim()) return;
    const seg = { id: editIdx==='new' ? Date.now().toString() : segments[editIdx].id, name: editName.trim(), color: editColor, tags: editTags };
    let updated;
    if (editIdx === 'new') updated = [...segments, seg];
    else { updated = segments.map((s,i)=>i===editIdx?seg:s); }
    onSave(updated);
    setEditIdx(null);
  }

  function removeSegment(i) {
    onSave(segments.filter((_,idx)=>idx!==i));
  }

  const allKnownTags = shopifyTags.length > 0 ? shopifyTags : [];
  const filteredTags = tagInput
    ? allKnownTags.filter(t=>t.toLowerCase().includes(tagInput.toLowerCase()) && !editTags.includes(t))
    : allKnownTags.filter(t=>!editTags.includes(t)).slice(0,80);

  return (
    <div>
      <div style={{display:'flex',gap:14,flexWrap:'wrap',alignItems:'flex-start'}}>
        {/* Segment list */}
        <div style={{flex:'1 1 280px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:14}}>Audience Segments</div>
            <button className="btn-primary btn-sm" onClick={openNew}>+ New Segment</button>
          </div>
          {segments.length===0 && (
            <div className="card" style={{padding:24,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>
              No segments yet. Create one to start categorising your audience.
            </div>
          )}
          {segments.map((s,i)=>(
            <div key={s.id} className="card" style={{padding:'12px 16px',marginBottom:8,display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:s.color,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13}}>{s.name}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3,display:'flex',gap:4,flexWrap:'wrap'}}>
                  {(s.tags||[]).slice(0,6).map(t=>(
                    <span key={t} style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:3,padding:'1px 5px',fontFamily:'monospace'}}>{t}</span>
                  ))}
                  {(s.tags||[]).length>6 && <span style={{color:'var(--text-dim)'}}>+{s.tags.length-6} more</span>}
                  {(s.tags||[]).length===0 && <span style={{fontStyle:'italic'}}>no tags assigned</span>}
                </div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn-ghost btn-sm" onClick={()=>openEdit(i)}>Edit</button>
                <button className="btn-danger btn-sm" onClick={()=>removeSegment(i)}>✕</button>
              </div>
            </div>
          ))}
        </div>

        {/* Editor panel */}
        {editIdx !== null && (
          <div className="card" style={{flex:'1 1 300px',maxWidth:420}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>{editIdx==='new'?'New Segment':'Edit Segment'}</div>
            <div className="field">
              <label>Segment Name</label>
              <input value={editName} onChange={e=>setEditName(e.target.value)} placeholder="e.g. High Risk, VIP, COD Loyal"/>
            </div>
            <div className="field">
              <label>Color</label>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:2}}>
                {AUDIENCE_COLORS.map(c=>(
                  <div key={c} onClick={()=>setEditColor(c)} style={{
                    width:24,height:24,borderRadius:'50%',background:c,cursor:'pointer',
                    border: editColor===c ? '2px solid #fff' : '2px solid transparent',
                    boxShadow: editColor===c ? '0 0 0 2px '+c : 'none',
                    transition:'all .15s',
                  }}/>
                ))}
              </div>
            </div>
            <div className="field">
              <label>Tags in this segment</label>
              <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8,minHeight:28}}>
                {editTags.map(t=>(
                  <span key={t} style={{
                    display:'inline-flex',alignItems:'center',gap:4,
                    background:'var(--bg-card2)',border:'1px solid var(--border2)',
                    borderRadius:4,padding:'2px 8px',fontSize:12,
                  }}>
                    <span style={{fontFamily:'monospace'}}>{t}</span>
                    <span onClick={()=>setEditTags(prev=>prev.filter(x=>x!==t))} style={{cursor:'pointer',color:'var(--text-muted)',fontSize:14,lineHeight:1}}>×</span>
                  </span>
                ))}
                {editTags.length===0 && <span style={{fontSize:12,color:'var(--text-muted)',fontStyle:'italic'}}>No tags yet</span>}
              </div>
              <input
                value={tagInput}
                onChange={e=>setTagInput(e.target.value)}
                onKeyDown={e=>{ if(e.key==='Enter'||e.key===','){ e.preventDefault(); addTag(tagInput); }}}
                placeholder={tagsLoading?'Loading tags…':'Search or type a tag, press Enter'}
                style={{marginBottom:6}}
              />
              {filteredTags.length>0 && (
                <div style={{
                  maxHeight:160,overflowY:'auto',border:'1px solid var(--border)',
                  borderRadius:6,background:'var(--bg-card2)',
                }}>
                  {filteredTags.slice(0,50).map(t=>(
                    <div key={t} onClick={()=>addTag(t)} style={{
                      padding:'6px 12px',fontSize:12,cursor:'pointer',fontFamily:'monospace',
                    }}
                    onMouseEnter={e=>e.currentTarget.style.background='var(--overlay-1)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      {t}
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div style={{display:'flex',gap:8,marginTop:4}}>
              <button className="btn-primary btn-sm" onClick={saveEdit} disabled={saving||!editName.trim()}>{saving?'Saving…':'Save Segment'}</button>
              <button className="btn-ghost btn-sm" onClick={()=>setEditIdx(null)}>Cancel</button>
            </div>
          </div>
        )}
      </div>
      <p style={{fontSize:12,color:'var(--text-muted)',marginTop:16}}>Segments are matched by order tags. An order counts for a segment if it has <em>any</em> of the assigned tags. The audience card on the dashboard reflects the selected date range.</p>
    </div>
  );
}

/* ─── ShipSagar AWB Tracking ─────────────────────────────────────── */
function ShipsagarPanel() {
  const [ssTab,setSsTab]       = useState('config');
  const [scope,setScope]       = useState('10');
  const [autoEnabled,setAutoEnabled] = useState(true);
  const [cronEnabled,setCronEnabled] = useState(true);
  const [testOrders,setTestOrders]   = useState([]);
  const [logs,setLogs]         = useState([]);
  const [expandedLog,setExpandedLog] = useState(null);
  const [logDetail,setLogDetail]     = useState(null);
  const [syncing,setSyncing]   = useState(false);
  const [syncing50,setSyncing50] = useState(false);
  const [msg,setMsg]           = useState(null);

  const load = () => {
    apiFetch('/admin/shipsagar/sync-settings').then(d=>{ setScope(d?.shipsagar_sync_scope||'10'); setAutoEnabled(d?.shipsagar_auto_enabled!==false); setCronEnabled(d?.shipsagar_cron_enabled!==false); });
    apiFetch('/admin/shipsagar/test-orders').then(d=>setTestOrders(d||[]));
    apiFetch('/admin/shipsagar/logs').then(d=>setLogs(d||[]));
  };
  useEffect(load, []);

  const saveScope = async (val) => {
    setScope(val); setMsg(null);
    try { await apiFetch('/admin/shipsagar/sync-settings',{method:'POST',body:JSON.stringify({shipsagar_sync_scope:val})}); setMsg({type:'success',text:'Scope saved!'}); }
    catch(e){ setMsg({type:'error',text:e.message}); }
  };

  const saveAuto = async (val) => {
    setAutoEnabled(val);
    try { await apiFetch('/admin/shipsagar/sync-settings',{method:'POST',body:JSON.stringify({shipsagar_auto_enabled:val})}); }
    catch(e){ setMsg({type:'error',text:e.message}); }
  };

  const saveCronEnabled = async (val) => {
    setCronEnabled(val); setMsg(null);
    try { await apiFetch('/admin/shipsagar/sync-settings',{method:'POST',body:JSON.stringify({shipsagar_cron_enabled:val})}); setMsg({type:'success',text:`ShipSagar cron ${val?'enabled':'disabled'}!`}); }
    catch(e){ setMsg({type:'error',text:e.message}); }
  };

  const runTest = async () => {
    setSyncing(true); setMsg(null);
    try {
      const orderIds = testOrders.map(o=>o.shopify_id);
      const d = await apiFetch('/admin/shipsagar/sync',{method:'POST',body:JSON.stringify({orderIds})});
      setMsg({type:'success',text:`Test sync done — checked ${d.checked}, updated ${d.updated}, errors ${d.errors}`});
      load(); setSsTab('reports');
    } catch(e){ setMsg({type:'error',text:e.message}); }
    setSyncing(false);
  };

  const runScopedSync = async () => {
    setSyncing(true); setMsg(null);
    try {
      const d = await apiFetch('/admin/shipsagar/sync',{method:'POST',body:JSON.stringify({})});
      setMsg({type:'success',text:`Sync done — checked ${d.checked}, updated ${d.updated}, errors ${d.errors}`});
      load(); setSsTab('reports');
    } catch(e){ setMsg({type:'error',text:e.message}); }
    setSyncing(false);
  };

  const runSync50 = async () => {
    setSyncing50(true); setMsg(null);
    try {
      const d = await apiFetch('/admin/shipsagar/sync-50',{method:'POST',body:JSON.stringify({})});
      setMsg({type:'success',text:`Crosscheck done — checked ${d.checked}, updated ${d.updated}, errors ${d.errors}. Admin email sent if any changes.`});
      load(); setSsTab('reports');
    } catch(e){ setMsg({type:'error',text:e.message}); }
    setSyncing50(false);
  };

  const loadLogDetail = async (id) => {
    if (expandedLog === id) { setExpandedLog(null); setLogDetail(null); return; }
    setExpandedLog(id); setLogDetail(null);
    try { const d = await apiFetch(`/admin/shipsagar/logs/${id}`); setLogDetail(d); }
    catch(e) { setLogDetail({ error: e.message }); }
  };

  const STAGE_COLORS = { new:'#6b7280',hold:'#f59e0b',confirmed:'#3b82f6',partial_collected:'#8b5cf6',ready:'#14b8a6',pickup:'#06b6d4',transit:'#6366f1',ofd:'#f97316',ndr:'#ef4444',delivered:'#22c55e',rto:'#dc2626',cancelled:'#9ca3af',misc:'#6b7280' };

  return (
    <div className="card" style={{maxWidth:700,marginTop:16}}>
      <div style={{fontWeight:700,marginBottom:4}}>ShipSagar AWB Tracking</div>
      <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:14}}>
        Tracks shipments by AWB across couriers via ShipSagar, and auto-tags orders as their delivery
        status changes (tag → stage rules are editable on the Tag Mapping tab). Connect your ShipSagar
        API key under Settings → Shipping first.
      </p>

      <div style={{display:'flex',gap:4,marginBottom:16,borderBottom:'1px solid var(--border)',paddingBottom:0}}>
        {[['config','Config & Sync'],['reports','Sync Reports']].map(([t,l])=>(
          <button key={t} onClick={()=>setSsTab(t)} style={{padding:'7px 16px',fontSize:13,fontWeight:600,background:'none',border:'none',borderBottom:ssTab===t?'2px solid var(--accent)':'2px solid transparent',color:ssTab===t?'var(--text)':'var(--text-muted)',cursor:'pointer',marginBottom:-1}}>{l}</button>
        ))}
      </div>

      {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:14}}>{msg.text}</div>}

      {ssTab==='config' && <>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',background:'var(--bg-card2)',borderRadius:8,marginBottom:10}}>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>ShipSagar Cron Tracking</div>
            <div style={{fontSize:11,color:'var(--text-muted)'}}>Turn off if you want to rely on eShipz only, or to avoid both running at once</div>
          </div>
          <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
            <input type="checkbox" checked={cronEnabled} onChange={e=>saveCronEnabled(e.target.checked)} style={{width:18,height:18,accentColor:'#111'}}/>
          </label>
        </div>

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',background:'var(--bg-card2)',borderRadius:8,marginBottom:16}}>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>Auto-track new fulfillments</div>
            <div style={{fontSize:11,color:'var(--text-muted)'}}>As soon as an order is fulfilled, push its AWB to ShipSagar and start tracking</div>
          </div>
          <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
            <input type="checkbox" checked={autoEnabled} onChange={e=>saveAuto(e.target.checked)} style={{width:18,height:18,accentColor:'#111'}}/>
          </label>
        </div>

        <div style={{background:'var(--bg-card2)',border:'1px solid var(--accent)',borderRadius:8,padding:'12px 14px',marginBottom:16}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Crosscheck Last 50 Fulfilled Orders</div>

          <button className="btn-primary btn-sm" onClick={runSync50} disabled={syncing50}>{syncing50?'Running crosscheck…':'Run Crosscheck on Last 50 Orders →'}</button>

      {ssTab==='reports' && <>

        {logs.map((l)=>{
          const lid = l._id?.toString();
          const isOpen = expandedLog === lid;
          const changes = l.stage_changes || [];
          return (
            <div key={lid} style={{border:'1px solid var(--border)',borderRadius:8,marginBottom:8,overflow:'hidden'}}>
              <div onClick={()=>loadLogDetail(lid)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',cursor:'pointer',background:'var(--bg-card2)'}}>
                <div>
                  <span style={{fontWeight:600,fontSize:13}}>{new Date(l.started_at).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</span>
                  <span style={{marginLeft:10,fontSize:11,color:'var(--text-muted)',background:'var(--overlay-2)',padding:'2px 7px',borderRadius:4}}>{l.triggered_by||'cron'}</span>
                </div>
                <div style={{display:'flex',gap:12,alignItems:'center',fontSize:12}}>
                  <span>checked <b>{l.checked}</b></span>
                  <span style={{color:l.updated>0?'#22c55e':'var(--text-muted)'}}>updated <b>{l.updated}</b></span>
                  {l.errors>0 && <span style={{color:'#ef4444'}}>errors <b>{l.errors}</b></span>}
                  <span style={{color:'var(--text-muted)'}}>{isOpen?'▲':'▼'}</span>
                </div>
              </div>
              {isOpen && <div style={{padding:'12px 14px'}}>
                {!logDetail && <div style={{fontSize:12,color:'var(--text-muted)'}}>Loading…</div>}
                {logDetail?.error && <div style={{fontSize:12,color:'#ef4444'}}>{logDetail.error}</div>}
                {logDetail && !logDetail.error && <>
                  {(logDetail.stage_changes||[]).length===0
                    ? <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:10}}>No stage changes this run — all orders were already up to date.</div>
                    : <>
                        <div style={{fontWeight:600,fontSize:12,marginBottom:8}}>Stage Movements ({(logDetail.stage_changes||[]).length})</div>
                        <div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',marginBottom:12}}>
                          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                            <thead><tr style={{background:'var(--bg-card2)'}}><th style={{padding:'6px 10px',textAlign:'left'}}>Order</th><th style={{padding:'6px 10px',textAlign:'left'}}>AWB</th><th style={{padding:'6px 10px',textAlign:'left'}}>From</th><th style={{padding:'6px 10px',textAlign:'left'}}>To</th><th style={{padding:'6px 10px',textAlign:'left',color:'var(--text-muted)'}}>Courier Message</th></tr></thead>
                            <tbody>
                              {(logDetail.stage_changes||[]).map((c,ci)=>(
                                <tr key={ci} style={{borderTop:'1px solid var(--border)'}}>
                                  <td style={{padding:'6px 10px',fontWeight:600}}>{c.order_name}</td>
                                  <td style={{padding:'6px 10px',fontFamily:'monospace',fontSize:11}}>{c.awb}</td>
                                  <td style={{padding:'6px 10px'}}><span style={{background:STAGE_COLORS[c.from_stage]+'22',color:STAGE_COLORS[c.from_stage],padding:'2px 7px',borderRadius:4,fontSize:11,fontWeight:600}}>{c.from_stage}</span></td>
                                  <td style={{padding:'6px 10px'}}><span style={{background:STAGE_COLORS[c.to_stage]+'22',color:STAGE_COLORS[c.to_stage],padding:'2px 7px',borderRadius:4,fontSize:11,fontWeight:600}}>{c.to_stage}</span></td>
                                  <td style={{padding:'6px 10px',color:'var(--text-muted)',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.courier_message}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </>
                  }
                  <details style={{fontSize:11}}>
                    <summary style={{cursor:'pointer',color:'var(--text-muted)',marginBottom:6}}>Raw sync log ({(logDetail.lines||[]).length} lines)</summary>
                    <div style={{background:'var(--bg-card2)',borderRadius:6,padding:'10px 12px',maxHeight:200,overflow:'auto',fontFamily:'monospace',fontSize:11,whiteSpace:'pre-wrap',lineHeight:1.6}}>{(logDetail.lines||[]).join('\n')}</div>
                  </details>
                </>}
              </div>}
            </div>
          );
        })}
      </>}
    </div>
  );
}

/* ─── Settings ────────────────────────────────────────────────── */
function Settings({ theme, setTheme, iconPreset, setIconPreset }) {
  const [tab,setTab]         = useState('staff');
  const [staff,setStaff]     = useState([]);
  const [newUser,setNewUser] = useState({username:'',name:'',password:''});
  const [newPw,setNewPw]     = useState('');
  const [tagMap,setTagMap]   = useState({});
  const [newTag,setNewTag]   = useState('');
  const [newStage,setNewStage] = useState('confirmed');
  const [shopifyTags,setShopifyTags] = useState([]);
  const [tagsLoading,setTagsLoading] = useState(false);
  const [rrSettings,setRrSettings] = useState({exchange_enabled:true,return_enabled:true,return_window_days:7,force_return_code:''});
  const [syncScope,setSyncScope] = useState('100');
  const [eshipzEnabled,setEshipzEnabled] = useState(true);
  const [segments,setSegments]   = useState([]);
  const [msg,setMsg]         = useState(null);
  const [saving,setSaving]   = useState(false);

  useEffect(()=>{
    apiFetch('/admin/staff').then(d=>setStaff(d||[]));
    apiFetch('/admin/tag-mappings').then(d=>setTagMap(d||{}));
    apiFetch('/admin/rr-settings').then(d=>setRrSettings(d));
    apiFetch('/admin/sync-settings').then(d=>{ setSyncScope(d?.tracking_sync_scope||'100'); setEshipzEnabled(d?.eshipz_cron_enabled!==false); });
    apiFetch('/admin/audience-segments').then(d=>setSegments(d||[]));
    setTagsLoading(true);
    apiFetch('/admin/shopify-tags').then(d=>setShopifyTags(d||[])).finally(()=>setTagsLoading(false));
  },[]);

  const addStaff = async () => {
    setSaving(true); setMsg(null);
    try {
      await apiFetch('/admin/staff',{method:'POST',body:JSON.stringify(newUser)});
      setMsg({type:'success',text:'Staff added!'}); setNewUser({username:'',name:'',password:''});
      apiFetch('/admin/staff').then(d=>setStaff(d||[]));
    } catch(e){setMsg({type:'error',text:e.message});}
    setSaving(false);
  };

  const removeStaff = async (username) => {
    if(!confirm(`Remove ${username}?`)) return;
    await apiFetch(`/admin/staff/${username}`,{method:'DELETE'});
    apiFetch('/admin/staff').then(d=>setStaff(d||[]));
  };

  const changePw = async () => {
    if(newPw.length<6){setMsg({type:'error',text:'Password too short'});return;}
    setSaving(true);
    try { const d = await apiFetch('/admin/change-password',{method:'POST',body:JSON.stringify({newPassword:newPw})}); setMsg({type:'success',text:d.message||'Password updated!'}); setNewPw(''); } catch(e){setMsg({type:'error',text:e.message});}
    setSaving(false);
  };

  const saveTagMap = async () => {
    setSaving(true); setMsg(null);
    try { await apiFetch('/admin/tag-mappings',{method:'POST',body:JSON.stringify({tag_mappings:tagMap})}); setMsg({type:'success',text:'Tag mappings saved!'}); } catch(e){setMsg({type:'error',text:e.message});}
    setSaving(false);
  };

  const addTagMapping = async () => {
    if(!newTag.trim()) return;
    const updated = {...tagMap,[newTag.trim()]:newStage};
    setTagMap(updated); setNewTag('');
    try { await apiFetch('/admin/tag-mappings',{method:'POST',body:JSON.stringify({tag_mappings:updated})}); setMsg({type:'success',text:'Mapping saved!'}); } catch(e){setMsg({type:'error',text:e.message});}
  };

  const saveRRSettings = async () => {
    setSaving(true); setMsg(null);
    try { await apiFetch('/admin/rr-settings',{method:'POST',body:JSON.stringify(rrSettings)}); setMsg({type:'success',text:'Return settings saved!'}); } catch(e){setMsg({type:'error',text:e.message});}
    setSaving(false);
  };

  const saveSyncScope = async (val) => {
    setSyncScope(val); setSaving(true); setMsg(null);
    try { await apiFetch('/admin/sync-settings',{method:'POST',body:JSON.stringify({tracking_sync_scope:val})}); setMsg({type:'success',text:'Tracking sync range saved!'}); } catch(e){setMsg({type:'error',text:e.message});}
    setSaving(false);
  };

  const saveEshipzEnabled = async (val) => {
    setEshipzEnabled(val); setMsg(null);
    try { await apiFetch('/admin/sync-settings',{method:'POST',body:JSON.stringify({eshipz_cron_enabled:val})}); setMsg({type:'success',text:`eShipz cron ${val?'enabled':'disabled'}!`}); } catch(e){setMsg({type:'error',text:e.message});}
  };

  return (
    <div>
      <div style={{marginBottom:20}}><h2 style={{fontSize:20,fontWeight:800}}>Settings</h2></div>
      <div style={{display:'flex',gap:4,marginBottom:18,flexWrap:'wrap'}}>
        {[['staff','Staff'],['tags','Tag Mapping'],['audience','Audience'],['returns','Returns & Exchanges'],['sync','Tracking Sync'],['security','Security'],['store','Store'],['appearance','Appearance']].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:'6px 12px',borderRadius:6,border:'1px solid '+(tab===id?'var(--pill-border-active)':'var(--border)'),background:tab===id?'var(--overlay-3)':'transparent',color:tab===id?'var(--text)':'var(--text-muted)',fontSize:12,fontWeight:600,cursor:'pointer'}}>{label}</button>
        ))}
      </div>
      {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:14}}>{msg.text}</div>}

      {tab==='staff' && (
        <div style={{display:'flex',gap:14,flexWrap:'wrap',alignItems:'flex-start'}}>
          <div className="card" style={{maxWidth:380,flex:'1 1 300px'}}>
            <div style={{fontWeight:700,marginBottom:14}}>Add Staff Account</div>
            {[['Username','username','johndoe'],['Full Name','name','John Doe'],['Password','password','']].map(([label,key,ph])=>(
              <div className="field" key={key}><label>{label}</label><input type={key==='password'?'password':'text'} value={newUser[key]} onChange={e=>setNewUser({...newUser,[key]:e.target.value})} placeholder={ph}/></div>
            ))}
            <button className="btn-primary" onClick={addStaff} disabled={saving}>{saving?'Adding…':'Add Staff'}</button>
          </div>
          <div className="card" style={{flex:'1 1 240px'}}>
            <div style={{fontWeight:700,marginBottom:12}}>Staff Accounts</div>
            {staff.length===0 && <div style={{color:'var(--text-muted)',fontSize:13}}>No staff added yet</div>}
            {staff.map(s=>(
              <div key={s.username} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <div><div style={{fontWeight:600,fontSize:13}}>{s.name||s.username}</div><div style={{fontSize:11,color:'var(--text-muted)'}}>@{s.username}</div></div>
                <button className="btn-danger btn-sm" onClick={()=>removeStaff(s.username)}>Remove</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==='tags' && (
        <div className="card" style={{maxWidth:560}}>
          <div style={{fontWeight:700,marginBottom:6}}>Tag → Stage Mapping</div>
          <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:16}}>When a Shopify order has a tag, automatically map it to a stage in your panel. Use this when vendors or fulfillers add tags to orders.</p>
          <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'flex-end'}}>
            <div style={{flex:'1 1 180px',display:'flex',flexDirection:'column',gap:4}}>
              <label>Shopify Tag</label>
              {shopifyTags.length > 0
                ? <select value={newTag} onChange={e=>setNewTag(e.target.value)} style={{width:'100%'}}>
                    <option value="">— Select a tag —</option>
                    {shopifyTags.filter(t=>!tagMap[t]).map(t=><option key={t} value={t}>{t}</option>)}
                  </select>
                : <input value={newTag} onChange={e=>setNewTag(e.target.value)} placeholder={tagsLoading?'Loading tags…':'e.g. dispatched'} disabled={tagsLoading} style={{width:'100%'}}/>
              }
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              <label>Maps to Stage</label>
              <select value={newStage} onChange={e=>setNewStage(e.target.value)} style={{width:140}}>
                {['new','hold','confirmed','partial_collected','ready','pickup','transit','ofd','ndr','delivered','rto','cancelled','misc'].map(s=><option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
              </select>
            </div>
            <button className="btn-ghost btn-sm" onClick={addTagMapping} disabled={!newTag}>Add Mapping</button>
          </div>
          {Object.keys(tagMap).length===0 && <div style={{color:'var(--text-muted)',fontSize:13,marginBottom:14}}>No mappings configured yet.</div>}
          {Object.entries(tagMap).map(([t,s])=>(
            <div key={t} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontFamily:'monospace',background:'var(--bg-card2)',padding:'2px 8px',borderRadius:4,fontSize:11}}>{t}</span>
                <span style={{color:'var(--text-muted)'}}>→</span>
                {stageBadge(s)}
              </div>
              <button className="btn-danger btn-sm" onClick={async()=>{const n={...tagMap};delete n[t];setTagMap(n);await apiFetch('/admin/tag-mappings',{method:'POST',body:JSON.stringify({tag_mappings:n})}).catch(()=>{});}}>Remove</button>
            </div>
          ))}
          <div style={{marginTop:16}}>
            <button className="btn-primary btn-sm" onClick={saveTagMap} disabled={saving}>{saving?'Saving…':'Save Mappings'}</button>
          </div>
        </div>
      )}

      {tab==='audience' && (
        <AudienceSettings
          segments={segments}
          shopifyTags={shopifyTags}
          tagsLoading={tagsLoading}
          onSave={async (segs) => {
            setSaving(true); setMsg(null);
            try {
              await apiFetch('/admin/audience-segments',{method:'POST',body:JSON.stringify({segments:segs})});
              setSegments(segs); setMsg({type:'success',text:'Audience segments saved!'});
            } catch(e){setMsg({type:'error',text:e.message});}
            setSaving(false);
          }}
          saving={saving}
        />
      )}

      {tab==='returns' && (
        <div className="card" style={{maxWidth:480}}>
          <div style={{fontWeight:700,marginBottom:6}}>Return & Exchange Settings</div>
          <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:18}}>Control whether customers can submit return or exchange requests from the track page.</p>
          {[
            ['exchange_enabled','Allow Exchanges','Customers can request product exchanges'],
            ['return_enabled','Allow Returns','Customers can request returns / refunds'],
          ].map(([key,label,desc])=>(
            <div key={key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{label}</div>
                <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>{desc}</div>
              </div>
              <label className="toggle">
                <input type="checkbox" checked={rrSettings[key]} onChange={e=>setRrSettings({...rrSettings,[key]:e.target.checked})}/>
                <span className="toggle-slider"/>
              </label>
            </div>
          ))}
          <div style={{padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>Return Window (days)</div>
            <input type="number" value={rrSettings.return_window_days} onChange={e=>setRrSettings({...rrSettings,return_window_days:parseInt(e.target.value)||7})} style={{width:100}} min="1" max="90"/>
          </div>
          <div style={{padding:'12px 0'}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:2}}>Force Return Code</div>
            <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>When returns are disabled, customers see a "Return unavailable" notice with an option to enter this code to unlock returns for their order. Leave blank to disable this override.</div>

          </div>

            <button className="btn-primary btn-sm" onClick={saveRRSettings} disabled={saving}>{saving?'Saving…':'Save Settings'}</button>
          </div>
        </div>
      )}

      {tab==='sync' && (
        <div className="card" style={{maxWidth:480}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',background:'var(--bg-card2)',borderRadius:8,marginBottom:16}}>
            <div>
              <div style={{fontWeight:600,fontSize:13}}>eShipz Cron Tracking</div>
              <div style={{fontSize:11,color:'var(--text-muted)'}}>Turn off if you want to rely on ShipSagar only, or to avoid both running at once</div>
            </div>
            <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
              <input type="checkbox" checked={eshipzEnabled} onChange={e=>saveEshipzEnabled(e.target.checked)} style={{width:18,height:18,accentColor:'#111'}}/>
            </label>
          </div>
          <div style={{fontWeight:700,marginBottom:6}}>Tracking Sync Range</div>
          <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:16}}>

          </p>
          {[
            ['50','Last 50 orders'],
            ['100','Last 100 orders'],
            ['7d','Last 7 days'],
            ['30d','Last 30 days'],
            ['80d','Last 80 days'],
            ['all','All orders (no limit)'],
          ].map(([val,label])=>(
            <label key={val} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',border:'1px solid '+(syncScope===val?'var(--accent)':'var(--border)'),borderRadius:8,marginBottom:8,cursor:'pointer',background:syncScope===val?'var(--bg-card2)':'transparent'}}>
              <input type="radio" name="syncScope" value={val} checked={syncScope===val} onChange={()=>saveSyncScope(val)} style={{accentColor:'#111',width:16,height:16}}/>
              <span style={{fontSize:13,fontWeight:600}}>{label}</span>
            </label>
          ))}
        </div>
      )}
      {tab==='sync' && <ShipsagarPanel/>}

      {tab==='security' && (
        <div className="card" style={{maxWidth:380}}>
          <div style={{fontWeight:700,marginBottom:14}}>Change Admin Password</div>
          <div className="field"><label>New Password</label><input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="Min 6 characters"/></div>
          <button className="btn-primary" onClick={changePw} disabled={saving}>{saving?'Updating…':'Update Password'}</button>
          <p style={{fontSize:11,color:'var(--text-muted)',marginTop:10}}>⚠ Also update ADMIN_PASSWORD in your Render environment variables.</p>
        </div>
      )}

      {tab==='appearance' && (
        <div style={{maxWidth:520}}>
          <div className="card" style={{marginBottom:16}}>
            <div style={{fontWeight:700,marginBottom:4}}>Theme</div>
            <div style={{color:'var(--text-muted)',fontSize:12,marginBottom:16}}>Choose how the admin panel looks.</div>
            <div style={{display:'flex',gap:12}}>
              {[
                {id:'dark',  label:'Dark',           desc:'Deep blacks, default look',    bg:'#0a0a0a', bar:'#fff'},
                {id:'bw',    label:'Black & White',  desc:'Pure black, white accents',    bg:'#000',    bar:'#fff'},
                {id:'light', label:'Light',          desc:'White background, black accents', bg:'#f5f5f5', bar:'#000'},
              ].map(opt=>(
                <button key={opt.id} onClick={()=>setTheme(opt.id)} style={{
                  flex:1,padding:'14px 16px',borderRadius:10,cursor:'pointer',textAlign:'left',transition:'all .15s',
                  background:theme===opt.id?'var(--bg-card2)':'var(--bg-card)',
                  border:`1.5px solid ${theme===opt.id?'var(--accent)':'var(--border)'}`,
                }}>
                  <div style={{width:'100%',height:48,borderRadius:6,marginBottom:10,background:opt.bg,border:'1px solid #ccc',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                    <div style={{width:28,height:6,borderRadius:3,background:opt.bar,opacity:.9}}/>
                    <div style={{width:16,height:6,borderRadius:3,background:opt.bar,opacity:.4}}/>
                  </div>
                  <div style={{fontWeight:700,fontSize:13,color:'var(--text)',marginBottom:2}}>{opt.label}</div>
                  <div style={{fontSize:11,color:'var(--text-muted)'}}>{opt.desc}</div>
                  {theme===opt.id && <div style={{marginTop:8,fontSize:11,fontWeight:700,color:'var(--accent)'}}>✓ Active</div>}

          </div>
          <div className="card">
            <div style={{fontWeight:700,marginBottom:4}}>Sidebar Icons</div>
            <div style={{color:'var(--text-muted)',fontSize:12,marginBottom:16}}>Choose between emoji icons or clean minimal SVG icons.</div>
            <div style={{display:'flex',gap:12}}>
              {[
                {id:'emoji',   label:'Emoji', desc:'Colourful emoji icons', icons:['📊','📦','↩','📧','🚚']},
                {id:'minimal', label:'Minimal', desc:'Clean monochrome SVG icons',
                  svgs:['dashboard','orders','returns','emails','shipping']},
              ].map(opt=>(
                <button key={opt.id} onClick={()=>setIconPreset(opt.id)} style={{
                  flex:1,padding:'14px 16px',borderRadius:10,cursor:'pointer',textAlign:'left',transition:'all .15s',
                  background:iconPreset===opt.id?'var(--bg-card2)':'var(--bg-card)',
                  border:`1.5px solid ${iconPreset===opt.id?'var(--accent)':'var(--border)'}`,
                }}>
                  <div style={{display:'flex',gap:8,marginBottom:10,alignItems:'center',height:32}}>
                    {opt.id==='emoji'
                      ? opt.icons.map(e=><span key={e} style={{fontSize:16}}>{e}</span>)
                      : opt.svgs.map(k=><span key={k} style={{color:'var(--text-muted)',display:'flex'}}>{SIDEBAR_ICONS_MINIMAL[k]}</span>)
                    }
                  </div>
                  <div style={{fontWeight:700,fontSize:13,color:'var(--text)',marginBottom:2}}>{opt.label}</div>
                  <div style={{fontSize:11,color:'var(--text-muted)'}}>{opt.desc}</div>
                  {iconPreset===opt.id && <div style={{marginTop:8,fontSize:11,fontWeight:700,color:'var(--accent)'}}>✓ Active</div>}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {tab==='store' && (
        <div className="card" style={{maxWidth:440}}>
          <div style={{fontWeight:700,marginBottom:14}}>Shopify Store Connection</div>
          <div style={{marginBottom:14,padding:'12px 14px',background:'var(--bg-card2)',borderRadius:8,fontSize:13}}>
            <div style={{fontWeight:600,marginBottom:4}}>Connect / Reconnect Store</div>
            <div style={{color:'var(--text-muted)',fontSize:12,marginBottom:10}}>Visit the install page to connect your Shopify store via OAuth.</div>
            <a href="/install" style={{color:'var(--cyan)',fontSize:13,fontWeight:600}}>Go to /install →</a>
          </div>
          <div style={{marginBottom:14,padding:'12px 14px',background:'var(--bg-card2)',borderRadius:8,fontSize:13}}>
            <div style={{fontWeight:600,marginBottom:4}}>Customer Track Page</div>
            <div style={{color:'var(--text-muted)',fontSize:12,marginBottom:8}}>Share this link with customers to track orders and submit returns.</div>
            <a href="/track" target="_blank" style={{color:'var(--cyan)',fontSize:13,fontWeight:600}}>{window.location.origin}/track →</a>
          </div>
          <div style={{fontSize:12,color:'var(--text-muted)',padding:'10px 14px',background:'var(--bg-card2)',borderRadius:8}}>
            <div style={{fontWeight:600,color:'var(--text)',marginBottom:4}}>Shopify App Redirect URL</div>
            <code style={{fontFamily:'monospace',color:'var(--accent-dim)',fontSize:11}}>{window.location.origin}/shopify/callback</code>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── Finance / P&L Calculator ───────────────── */
function Finance() {
  const [period, setPeriod]       = useState('30d');
  const [loading, setLoading]     = useState(true);
  const [live, setLive]           = useState(null);
  const [mktMode, setMktMode]     = useState('cpp');

  // Inputs — pre-filled from live, editable
  const [totalRevenue, setTotalRevenue] = useState(1200000);
  const [asp,          setAsp]          = useState(2400); // avg selling price — drives order count
  const [totalOrders,  setTotalOrders]  = useState(500);  // derived from revenue/asp but also editable
  const [rtoRate,      setRtoRate]      = useState(28);
  const [cpp,          setCpp]          = useState(300);
  const [totalMkt,     setTotalMkt]     = useState(150000);
  const [productCost,  setProductCost]  = useState(380);
  const [fwdShipping,  setFwdShipping]  = useState(100);
  const [rtoShipping,  setRtoShipping]  = useState(100);
  const [codRate,      setCodRate]      = useState(1.5);

  const loadStats = (p) => {
    setLoading(true);
    apiFetch(`/admin/finance-stats?period=${p}`).then(d => {
      if (!d || d.error) return;
      setLive(d);
      setTotalRevenue(d.totalRevenue || 1200000);
      const liveAsp = d.aov || 2400;
      setAsp(Math.round(liveAsp));
      setTotalOrders(d.totalOrders || Math.round((d.totalRevenue || 1200000) / liveAsp));
      setRtoRate(parseFloat((d.rtoRate || 28).toFixed(1)));
    }).finally(() => setLoading(false));
  };
  useEffect(() => loadStats(period), []);

  const changePeriod = (p) => { setPeriod(p); loadStats(p); };

  // Derived
  const aov              = asp; // ASP is now the explicit input; orders = revenue / asp
  const rtoFrac          = rtoRate / 100;
  const rtoOrders        = Math.round(totalOrders * rtoFrac);
  const deliveredOrders  = totalOrders - rtoOrders;
  const deliveryRate     = (100 - rtoRate).toFixed(1);
  const marketing        = mktMode === 'cpp' ? totalOrders * cpp : totalMkt;
  const effectiveCpp     = totalOrders > 0 ? marketing / totalOrders : 0;
  const cogs             = deliveredOrders * productCost;
  const totalFwdShip     = totalOrders * fwdShipping;
  const totalRTOShip     = rtoOrders * rtoShipping;
  const codCharges       = totalRevenue * codRate / 100;
  const totalCosts       = cogs + totalFwdShip + totalRTOShip + marketing + codCharges;
  const netProfit        = totalRevenue - totalCosts;
  const margin           = totalRevenue > 0 ? (netProfit / totalRevenue) * 100 : 0;
  const rtoLoss          = rtoOrders * (fwdShipping + rtoShipping);
  const profitPerOrder   = deliveredOrders > 0 ? netProfit / deliveredOrders : 0;
  const roas             = marketing > 0 ? totalRevenue / marketing : 0;

  const fmtINR = (n) => {
    const abs = Math.abs(n);
    if (abs >= 10000000) return '₹' + (n/10000000).toFixed(2) + ' Cr';
    if (abs >= 100000)   return '₹' + (n/100000).toFixed(1) + 'L';
    if (abs >= 1000)     return '₹' + (n/1000).toFixed(1) + 'K';
    return '₹' + Math.round(n).toLocaleString('en-IN');
  };
  const fmtBig = (n) => {
    const sign = n < 0 ? '−₹' : '₹';
    const abs = Math.abs(n);
    if (abs >= 10000000) return sign + (abs/10000000).toFixed(2) + ' Cr';
    if (abs >= 100000)   return sign + (abs/100000).toFixed(1) + 'L';
    if (abs >= 1000)     return sign + (abs/1000).toFixed(1) + 'K';
    return sign + Math.round(abs).toLocaleString('en-IN');
  };

  const healthColor  = netProfit < 0 ? '#FF5252' : margin < 8 ? '#FFB347' : margin < 20 ? '#C8F56A' : '#4DDB8A';
  const healthLabel  = netProfit < 0 ? 'Loss-Making' : margin < 5 ? 'Break-Even Zone' : margin < 15 ? 'Getting There' : margin < 25 ? 'Healthy' : 'Excellent';
  const healthWidth  = netProfit < 0 ? 0 : Math.min((margin / 40) * 100, 100);

  let insight = '';
  if (netProfit < 0) {
    insight = `You're losing ${fmtINR(Math.abs(netProfit))} this period. Biggest drain: COGS ${fmtINR(cogs)} + Marketing ${fmtINR(marketing)}. Saving ₹${Math.ceil(Math.abs(netProfit)/totalOrders)} per order closes the gap.`;
  } else if (rtoRate > 20) {
    insight = `RTO is costing ${fmtINR(rtoLoss)} in wasted shipping on ${rtoOrders.toLocaleString('en-IN')} returns. Cutting RTO by 5% saves ~${fmtINR(totalOrders * 0.05 * (fwdShipping + rtoShipping))} per period.`;
  } else if (roas < 3 && marketing > 0) {
    insight = `ROAS is ${roas.toFixed(1)}x — aim for 3x+. Reducing CPP by 20% would add ${fmtINR(marketing * 0.2)} to profit.`;
  } else {
    insight = `Solid at ${margin.toFixed(1)}% margin — ${fmtINR(profitPerOrder)} profit per delivered order. ROAS ${roas.toFixed(1)}x means every ₹1 in marketing returns ₹${roas.toFixed(1)}.`;
  }

  const NumSlider = ({label, badge, value, setValue, min, max, step=1, prefix='₹', suffix='', sliderMax}) => (
    <div style={{marginBottom:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
        <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{label}</span>
        {badge && <span style={{fontSize:10,padding:'2px 7px',borderRadius:20,background:'var(--overlay-2)',color:'#4DDB8A',border:'1px solid #2a4a2a'}}>{badge}</span>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:12,color:'var(--text-muted)',width:10,flexShrink:0}}>{prefix}</span>
        <input type="number" value={value} min={min} max={max} step={step}
          onChange={e=>setValue(parseFloat(e.target.value)||0)}
          style={{width:110,padding:'6px 8px',background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:14,fontWeight:600,outline:'none'}}/>
        <span style={{fontSize:12,color:'var(--text-muted)'}}>{suffix}</span>
        <input type="range" min={min} max={sliderMax||max} step={step} value={Math.min(value,sliderMax||max)}
          onChange={e=>setValue(parseFloat(e.target.value))}
          style={{flex:1,accentColor:'var(--accent)',cursor:'pointer'}}/>
      </div>
    </div>
  );

  const PnlRow = ({label, value, type='cost', pct}) => (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 14px',borderBottom:'1px solid var(--border)',fontSize:13}}>
      <span style={{color:'var(--text-muted)'}}>{type==='cost'?'− ':''}{label}</span>
      <span style={{fontVariantNumeric:'tabular-nums',fontWeight:600,color:type==='revenue'?'var(--text)':type==='profit'?(netProfit>=0?'#4DDB8A':'#FF5252'):'var(--text-muted)'}}>
        {type==='profit'?(netProfit<0?'−₹':'₹')+Math.abs(Math.round(value)).toLocaleString('en-IN'):'₹'+Math.round(value).toLocaleString('en-IN')}
        {pct!=null && <span style={{fontSize:10,color:'var(--text-muted)',marginLeft:4}}>{pct.toFixed(1)}%</span>}
      </span>
    </div>
  );

  return (
    <div style={{display:'flex',flexDirection:'column',gap:0,minHeight:'100%'}}>
      {/* Header */}
      <div style={{padding:'20px 24px 14px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
        <div>
          <div style={{fontWeight:700,fontSize:16}}>P&L Calculator</div>
          <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>Pre-filled from your live Shopify + ShipSagar data — adjust any input</div>
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:6}}>
          {[['7d','7 Days'],['30d','30 Days'],['90d','90 Days'],['all','All Time']].map(([p,l])=>(
            <button key={p} onClick={()=>changePeriod(p)} style={{padding:'5px 12px',fontSize:11,fontWeight:600,borderRadius:6,border:'1px solid '+(period===p?'var(--accent)':'var(--border)'),background:period===p?'var(--accent)':'transparent',color:period===p?'#000':'var(--text-muted)',cursor:'pointer'}}>{l}</button>
          ))}
        </div>
        {loading && <span style={{fontSize:11,color:'var(--text-muted)'}}>Refreshing…</span>}
        {live && !loading && <span style={{fontSize:11,color:'#4DDB8A'}}>● Live data loaded</span>}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 340px',flex:1}}>

        {/* ── LEFT: INPUTS ── */}
        <div style={{padding:'20px 24px',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',gap:14,overflowY:'auto'}}>

          {/* Revenue & Scale */}
          <div className="card">
            <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:14}}>Revenue &amp; Scale</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              <NumSlider label="Total Revenue" badge="Shopify" value={totalRevenue} setValue={v=>{ setTotalRevenue(v); setTotalOrders(asp>0?Math.round(v/asp):totalOrders); }} min={0} max={999999999} step={1000} sliderMax={10000000}/>
              <NumSlider label="Avg Selling Price (ASP)" badge="Shopify" value={asp} setValue={v=>{ setAsp(v); setTotalOrders(v>0?Math.round(totalRevenue/v):totalOrders); }} min={1} max={99999} step={50} sliderMax={10000}/>
            </div>
            <div style={{display:'flex',gap:24,padding:'10px 0 0',borderTop:'1px solid var(--border)',fontSize:12,color:'var(--text-muted)',flexWrap:'wrap'}}>
              <span>Total Orders: <b style={{color:'var(--text)'}}>{totalOrders.toLocaleString('en-IN')}</b> <span style={{fontSize:10}}>(Revenue ÷ ASP)</span></span>
              <span>Delivered: <b style={{color:'#4DDB8A'}}>{deliveredOrders.toLocaleString('en-IN')}</b></span>
              <span>RTO: <b style={{color:'#FF5252'}}>{rtoOrders.toLocaleString('en-IN')}</b></span>
            </div>
          </div>

          {/* Marketing */}
          <div className="card">
            <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:10}}>Marketing Spend</div>
            <div style={{display:'flex',gap:6,marginBottom:14}}>
              {[['cpp','Cost Per Purchase'],['total','Total Spend']].map(([m,l])=>(
                <button key={m} onClick={()=>setMktMode(m)} style={{flex:1,padding:'7px',fontSize:12,fontWeight:600,borderRadius:6,border:'1px solid '+(mktMode===m?'var(--accent)':'var(--border)'),background:mktMode===m?'var(--accent)':'transparent',color:mktMode===m?'#000':'var(--text-muted)',cursor:'pointer'}}>{l}</button>
              ))}
            </div>
            {mktMode==='cpp'
              ? <><NumSlider label="Cost Per Purchase (CPP)" value={cpp} setValue={setCpp} min={0} max={9999} step={10} sliderMax={2000}/>
                  <div style={{fontSize:11,color:'var(--text-muted)'}}>Total marketing spend: <b style={{color:'var(--text)'}}>{fmtINR(marketing)}</b></div></>
              : <><NumSlider label="Total Marketing Spend" value={totalMkt} setValue={setTotalMkt} min={0} max={99999999} step={1000} sliderMax={5000000}/>
                  <div style={{fontSize:11,color:'var(--text-muted)'}}>Effective CPP: <b style={{color:'var(--text)'}}>₹{Math.round(effectiveCpp).toLocaleString('en-IN')}</b></div></>
            }
          </div>

          {/* Unit Economics */}
          <div className="card">
            <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:14}}>Unit Economics</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              <NumSlider label="Avg Product Cost" value={productCost} setValue={setProductCost} min={0} max={9999} step={10} sliderMax={3000}/>
              <NumSlider label="COD Charges" value={codRate} setValue={setCodRate} min={0} max={10} step={0.1} prefix="" suffix="% of revenue" sliderMax={5}/>
            </div>
          </div>

          {/* Logistics + RTO */}
          <div className="card">
            <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:14}}>Logistics &amp; RTO</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16}}>
              <NumSlider label="RTO Rate" badge="ShipSagar" value={rtoRate} setValue={setRtoRate} min={0} max={100} step={0.5} prefix="" suffix="%" sliderMax={70}/>
              <NumSlider label="Forward Shipping" value={fwdShipping} setValue={setFwdShipping} min={0} max={999} step={5} sliderMax={500}/>
              <NumSlider label="RTO Reverse" value={rtoShipping} setValue={setRtoShipping} min={0} max={999} step={5} sliderMax={500}/>
            </div>
            <div style={{display:'flex',gap:24,padding:'10px 0 0',borderTop:'1px solid var(--border)',fontSize:12,color:'var(--text-muted)'}}>
              <span>Delivery Rate: <b style={{color:'#4DDB8A'}}>{deliveryRate}%</b></span>
              <span>RTO shipping loss: <b style={{color:'#FF5252'}}>{fmtINR(rtoLoss)}</b></span>
            </div>
          </div>

        </div>

        {/* ── RIGHT: SUMMARY ── */}
        <div style={{padding:'20px 18px',display:'flex',flexDirection:'column',gap:12,overflowY:'auto',position:'sticky',top:0,maxHeight:'calc(100vh - 120px)'}}>

          {/* Big number */}
          <div className="card" style={{textAlign:'center',padding:'20px 16px'}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:8}}>Net Profit / Loss</div>
            <div style={{fontSize:38,fontWeight:800,letterSpacing:'-0.03em',fontVariantNumeric:'tabular-nums',color:healthColor,lineHeight:1,marginBottom:6}}>{fmtBig(netProfit)}</div>
            <div style={{fontSize:13,fontWeight:600,color:healthColor,marginBottom:14}}>{netProfit>=0?'+':''}{margin.toFixed(1)}% margin</div>
            <div style={{height:6,borderRadius:3,background:'var(--overlay-2)',overflow:'hidden',marginBottom:8}}>
              <div style={{height:'100%',width:healthWidth+'%',background:healthColor,borderRadius:3,transition:'width .4s ease'}}/>
            </div>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:healthColor}}>{healthLabel}</div>
          </div>

          {/* P&L breakdown */}
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
            <div style={{padding:'10px 14px',fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-muted)',borderBottom:'1px solid var(--border)'}}>P&amp;L Breakdown</div>
            <PnlRow label="Revenue" value={totalRevenue} type="revenue"/>
            <PnlRow label="Cost of Goods" value={cogs} pct={totalRevenue>0?cogs/totalRevenue*100:0}/>
            <PnlRow label="Forward Shipping" value={totalFwdShip} pct={totalRevenue>0?totalFwdShip/totalRevenue*100:0}/>
            <PnlRow label="RTO Shipping" value={totalRTOShip} pct={totalRevenue>0?totalRTOShip/totalRevenue*100:0}/>
            <PnlRow label="Marketing" value={marketing} pct={totalRevenue>0?marketing/totalRevenue*100:0}/>
            <PnlRow label="COD Charges" value={codCharges} pct={totalRevenue>0?codCharges/totalRevenue*100:0}/>
            <div style={{display:'flex',justifyContent:'space-between',padding:'10px 14px',background:'var(--overlay-1)',fontWeight:700,fontSize:14}}>
              <span>Net Profit</span>
              <span style={{fontVariantNumeric:'tabular-nums',color:netProfit>=0?'#4DDB8A':'#FF5252'}}>{netProfit<0?'−₹':'₹'}{Math.abs(Math.round(netProfit)).toLocaleString('en-IN')}</span>
            </div>
          </div>

          {/* Key metrics */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {[
              { label:'ROAS', val: marketing>0?roas.toFixed(1)+'x':'—', color: roas>=3?'#4DDB8A':roas>=1.5?'#FFB347':'#FF5252' },
              { label:'Profit / Delivered', val: fmtINR(profitPerOrder), color: profitPerOrder>=0?'#4DDB8A':'#FF5252' },
              { label:'RTO Shipping Loss', val: fmtINR(rtoLoss), color: '#FF5252' },
              { label:'Effective CPP', val: '₹'+Math.round(effectiveCpp).toLocaleString('en-IN'), color: 'var(--text)' },
            ].map(m=>(
              <div key={m.label} className="card" style={{padding:'12px 14px'}}>
                <div style={{fontSize:20,fontWeight:800,color:m.color,fontVariantNumeric:'tabular-nums',letterSpacing:'-0.02em'}}>{m.val}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{m.label}</div>
              </div>
            ))}
          </div>

          {/* Insight */}
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderLeft:'3px solid var(--accent)',borderRadius:10,padding:'12px 14px',fontSize:12,color:'var(--text-muted)',lineHeight:1.7}}>
            {insight}
          </div>

        </div>
      </div>
    </div>
  );
}

function SyncLogs() {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [syncing, setSyncing] = useState(false);

  const load = async () => {
    setLoading(true);
    try {
      const d = await apiFetch('/admin/sync-tracking/logs');
      setLogs(Array.isArray(d) ? d : []);
    } catch(e) { console.error('sync logs fetch error:', e); }
    finally { setLoading(false); }
  };

  const triggerSync = async () => {
    setSyncing(true);
    try {
      await apiFetch('/admin/sync-tracking', { method: 'POST' });
      // Poll every 3s for up to 60s until a new log appears
      const before = logs[0]?.started_at || null;
      let attempts = 0;
      const poll = setInterval(async () => {
        attempts++;
        try {
          const d = await apiFetch('/admin/sync-tracking/logs');
          if (d.length > 0 && d[0].started_at !== before) {
            setLogs(d);
            setSyncing(false);
            clearInterval(poll);
          }
        } catch {}
        if (attempts >= 20) { setSyncing(false); clearInterval(poll); load(); }
      }, 3000);
    } catch(e) { alert('Error: ' + e.message); setSyncing(false); }
  };

  useEffect(() => { load(); }, []);

  const stageColor = s => s==='delivered'?'#22c55e':s==='transit'||s==='ofd'?'#f59e0b':s==='rto'?'#ef4444':s==='partial_collected'?'#f59e0b':'#888';

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:800}}>Tracking Sync Logs</h2>
          <p style={{color:'var(--text-muted)',fontSize:13,marginTop:2}}>Auto-syncs every 2 hours from eShipz</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn-ghost btn-sm" onClick={load} disabled={loading}>{loading?<span className="spin">↻</span>:'↻ Refresh'}</button>
          <button className="btn-primary btn-sm" onClick={triggerSync} disabled={syncing}>{syncing?<span className="spin">↻</span>+' Running…':'▶ Run Sync Now'}</button>
        </div>
      </div>

      {logs.length === 0 && !loading && (
        <div className="card" style={{textAlign:'center',color:'var(--text-muted)',padding:40}}>No sync runs yet. Click "Run Sync Now" to start.</div>
      )}

      {logs.map((run, i) => (
        <div key={i} className="card" style={{marginBottom:12,padding:0,overflow:'hidden'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 18px',cursor:'pointer',borderBottom: expanded===i ? '1px solid var(--border)' : 'none'}}
            onClick={()=>setExpanded(expanded===i?null:i)}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontSize:18}}>{run.errors>0?'⚠️':run.updated>0?'🔄':'✅'}</span>
              <div>
                <div style={{fontWeight:700,fontSize:13}}>{new Date(run.started_at).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
                <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>
                  {run.checked} checked · <span style={{color:'#22c55e',fontWeight:600}}>{run.updated} updated</span> · {run.skipped} skipped · {run.errors>0?<span style={{color:'#ef4444'}}>{run.errors} errors</span>:<span>0 errors</span>} · {((new Date(run.finished_at)-new Date(run.started_at))/1000).toFixed(1)}s
                </div>
              </div>
            </div>
            <span style={{color:'var(--text-muted)',fontSize:12}}>{expanded===i?'▲ Hide':'▼ Show'} logs</span>
          </div>

          {expanded===i && (
            <div style={{padding:'12px 18px',background:'var(--bg-card2)',fontFamily:'monospace',fontSize:12,maxHeight:400,overflowY:'auto'}}>
              {(run.lines||[]).map((line, j) => {
                const color = line.startsWith('🔄')?'#f59e0b':line.startsWith('📨')?'#22c55e':line.startsWith('❌')?'#ef4444':line.startsWith('✓')?'var(--text-muted)':line.startsWith('━')?'var(--text)':'var(--text)';
                return <div key={j} style={{color,padding:'2px 0',borderBottom:'1px solid var(--border)',lineHeight:1.6}}>{line}</div>;
              })}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function App() {
  const [authed,setAuthed]   = useState(!!token());
  const [tab,setTab]         = useState('dashboard');
  const [theme,setThemeState] = useState(getStoredTheme);
  const [iconPreset,setIconPresetState] = useState(getStoredIcons);

  useEffect(() => { applyTheme(theme); }, [theme]);

  const setTheme = (t) => { setThemeState(t); applyTheme(t); };
  const setIconPreset = (p) => { setIconPresetState(p); localStorage.setItem('fc_icons', p); };

  const logout = async () => {
    try { await apiFetch('/admin/logout',{method:'POST'}); } catch {}
    clearToken(); setAuthed(false);
  };

  if (!authed) return <Login onLogin={()=>setAuthed(true)}/>;

  const views = {
    dashboard: <Dashboard/>, orders: <Orders/>, returns: <Returns/>,
    emails: <Emails/>, finance: <Finance/>, shipping: <Shipping/>, synclogs: <SyncLogs/>,
    settings: <Settings theme={theme} setTheme={setTheme} iconPreset={iconPreset} setIconPreset={setIconPreset}/>,
  };

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar tab={tab} setTab={setTab} onLogout={logout} iconPreset={iconPreset}/>
      <main style={{flex:1,overflow:'auto',minHeight:'100vh'}}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'28px 28px'}}>
          {views[tab] || <Dashboard/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
